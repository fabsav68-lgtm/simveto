<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PraxisVeto · Acces</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0d08">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0d08;color:#d8e8d0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 40% at 20% 0%,rgba(120,216,64,.06) 0%,transparent 55%);}
.card{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:32px 24px;max-width:340px;width:100%;text-align:center;position:relative;z-index:1;}
.logo{font-family:Georgia,serif;font-size:32px;font-weight:700;color:#d8e8d0;margin-bottom:4px}
.logo span{color:#78d840}
.badge{display:inline-block;background:rgba(120,216,64,.08);border:1px solid rgba(120,216,64,.22);color:#78d840;padding:3px 12px;border-radius:20px;font-size:10px;letter-spacing:2px;font-family:monospace;margin-bottom:20px;}
h2{font-size:18px;margin-bottom:6px;color:#d8e8d0}
p{font-size:13px;color:#4a6840;margin-bottom:20px;line-height:1.6}
input{width:100%;padding:12px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;color:#d8e8d0;font-size:16px;text-align:center;font-family:monospace;letter-spacing:2px;text-transform:uppercase;outline:none;margin-bottom:12px;}
input:focus{border-color:rgba(120,216,64,.4);}
input.success{border-color:#78d840;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#50a820,#78d840);color:#0a0d08;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.danger{color:#e84040;font-size:12px;margin-top:8px;min-height:18px;}
.small{font-size:11px;color:#4a6840;margin-top:16px;font-family:monospace;}
.bar-wrap{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:16px;overflow:hidden;display:none;}
.bar-fill{height:100%;width:0%;background:#78d840;border-radius:2px;transition:width .05s linear;}
.card-success{display:none;}
.card-success h2{color:#78d840;font-size:20px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Praxis<span>Veto</span></div>
  <div class="badge">ASV · CAFASV RNCP40344</div>

  <div id="card-login">
    <h2>Acces PraxisVeto</h2>
    <p>Entrez votre code personnel pour acceder a la suite pedagogique ASV.</p>
    <input type="text" id="code-input" placeholder="PRAXIS-ASV-001" maxlength="20"
      onkeydown="if(event.key==='Enter')validerCode()"
      oninput="this.value=this.value.toUpperCase()">
    <button class="btn" onclick="validerCode()">Acceder</button>
    <p class="danger" id="error-msg"></p>
    <div class="bar-wrap" id="bar-wrap">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
    <p class="small">Codes : PRAXIS-ASV-001 a 050 · PRAXIS-VETO-FORM-01</p>
  </div>

  <div class="card-success" id="card-success">
    <h2>Bienvenue !</h2>
    <p id="success-msg">Redirection en cours...</p>
    <div class="bar-wrap" id="bar-wrap2" style="display:block">
      <div class="bar-fill" id="bar-fill2"></div>
    </div>
  </div>
</div>

<script>
var CODES_VALIDES = {
  'PRAXIS-ASV-001':{promo:'ASV 2026'},'PRAXIS-ASV-002':{promo:'ASV 2026'},'PRAXIS-ASV-003':{promo:'ASV 2026'},
  'PRAXIS-ASV-004':{promo:'ASV 2026'},'PRAXIS-ASV-005':{promo:'ASV 2026'},'PRAXIS-ASV-006':{promo:'ASV 2026'},
  'PRAXIS-ASV-007':{promo:'ASV 2026'},'PRAXIS-ASV-008':{promo:'ASV 2026'},'PRAXIS-ASV-009':{promo:'ASV 2026'},
  'PRAXIS-ASV-010':{promo:'ASV 2026'},'PRAXIS-ASV-011':{promo:'ASV 2026'},'PRAXIS-ASV-012':{promo:'ASV 2026'},
  'PRAXIS-ASV-013':{promo:'ASV 2026'},'PRAXIS-ASV-014':{promo:'ASV 2026'},'PRAXIS-ASV-015':{promo:'ASV 2026'},
  'PRAXIS-ASV-016':{promo:'ASV 2026'},'PRAXIS-ASV-017':{promo:'ASV 2026'},'PRAXIS-ASV-018':{promo:'ASV 2026'},
  'PRAXIS-ASV-019':{promo:'ASV 2026'},'PRAXIS-ASV-020':{promo:'ASV 2026'},'PRAXIS-ASV-021':{promo:'ASV 2026'},
  'PRAXIS-ASV-022':{promo:'ASV 2026'},'PRAXIS-ASV-023':{promo:'ASV 2026'},'PRAXIS-ASV-024':{promo:'ASV 2026'},
  'PRAXIS-ASV-025':{promo:'ASV 2026'},'PRAXIS-ASV-026':{promo:'ASV 2026'},'PRAXIS-ASV-027':{promo:'ASV 2026'},
  'PRAXIS-ASV-028':{promo:'ASV 2026'},'PRAXIS-ASV-029':{promo:'ASV 2026'},'PRAXIS-ASV-030':{promo:'ASV 2026'},
  'PRAXIS-ASV-031':{promo:'ASV 2026'},'PRAXIS-ASV-032':{promo:'ASV 2026'},'PRAXIS-ASV-033':{promo:'ASV 2026'},
  'PRAXIS-ASV-034':{promo:'ASV 2026'},'PRAXIS-ASV-035':{promo:'ASV 2026'},'PRAXIS-ASV-036':{promo:'ASV 2026'},
  'PRAXIS-ASV-037':{promo:'ASV 2026'},'PRAXIS-ASV-038':{promo:'ASV 2026'},'PRAXIS-ASV-039':{promo:'ASV 2026'},
  'PRAXIS-ASV-040':{promo:'ASV 2026'},'PRAXIS-ASV-041':{promo:'ASV 2026'},'PRAXIS-ASV-042':{promo:'ASV 2026'},
  'PRAXIS-ASV-043':{promo:'ASV 2026'},'PRAXIS-ASV-044':{promo:'ASV 2026'},'PRAXIS-ASV-045':{promo:'ASV 2026'},
  'PRAXIS-ASV-046':{promo:'ASV 2026'},'PRAXIS-ASV-047':{promo:'ASV 2026'},'PRAXIS-ASV-048':{promo:'ASV 2026'},
  'PRAXIS-ASV-049':{promo:'ASV 2026'},'PRAXIS-ASV-050':{promo:'ASV 2026'},
  'PRAXIS-VETO-FORM-01':{promo:'Formateur ASV'}
};

function validerCode(){
  var code = document.getElementById('code-input').value.trim().toUpperCase();
  var err = document.getElementById('error-msg');
  if(!code){ err.textContent='Entrez votre code.'; return; }
  if(!CODES_VALIDES[code]){ err.textContent='Code invalide. Verifiez votre code ASV.'; return; }
  var info = CODES_VALIDES[code];
  sessionStorage.setItem('praxisveto_code', code);
  sessionStorage.setItem('praxisveto_promo', info.promo);

  // Envoi Supabase
  fetch("https://uhbbwtxmsomqhuvzvoxy.supabase.co/rest/v1/praxis", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoYmJ3dHhtc29tcWh1dnp2b3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTI2OTIsImV4cCI6MjA5OTA4ODY5Mn0.WsH1qUbwjL8eF0y5vUBqG8lvpE4UgbNd3k2JbBGVyyY",
      "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoYmJ3dHhtc29tcWh1dnp2b3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTI2OTIsImV4cCI6MjA5OTA4ODY5Mn0.WsH1qUbwjL8eF0y5vUBqG8lvpE4UgbNd3k2JbBGVyyY"
    },
    body: JSON.stringify({
      student_code: code,
      student_name: info.promo,
      app: "praxisveto",
      module: "login",
      session_id: code + "_" + Date.now()
    })
  });

  document.getElementById('card-login').style.display = 'none';
  document.getElementById('card-success').style.display = 'block';
  document.getElementById('success-msg').textContent = 'Bienvenue ' + info.promo + ' ! Redirection en cours...';

  var fill = document.getElementById('bar-fill2');
  var pct = 0;
  var iv = setInterval(function(){
    pct += 2;
    fill.style.width = pct + '%';
    if(pct >= 100){ clearInterval(iv); window.location.replace('index.html'); }
  }, 20);
}
</script>
</body>
</html>
