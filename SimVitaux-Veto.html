<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimVitaux · UC4 CAFASV · SimVeto</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Karla:wght@300;400;500;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--card:rgba(255,255,255,.04);--bdr:rgba(255,255,255,.08);
  --txt:#d0d8f0;--txt2:#384060;--em:#60a8f8;--em2:#2060c0;
  --amber:#e8a030;--red:#e84040;--green:#40c878;--violet:#a060e8;
  --head:'Unbounded',sans-serif;--sans:'Karla',sans-serif;--mono:'Fira Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:80px;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(96,168,248,.07) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 80% 90%,rgba(64,200,120,.04) 0%,transparent 50%);
  background-image:
    repeating-linear-gradient(0deg,rgba(96,168,248,.015) 0px,rgba(96,168,248,.015) 1px,transparent 1px,transparent 60px),
    repeating-linear-gradient(90deg,rgba(96,168,248,.015) 0px,rgba(96,168,248,.015) 1px,transparent 1px,transparent 60px)}
.wrap{max-width:720px;margin:0 auto;padding:0 18px;position:relative;z-index:1}
.site-header{padding:40px 22px 24px;text-align:center;position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(96,168,248,.08);border:1px solid rgba(96,168,248,.22);color:var(--em);padding:4px 16px;border-radius:20px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.site-header h1{font-family:var(--head);font-size:clamp(26px,5vw,48px);font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:8px}
.site-header h1 span{color:var(--em)}
.site-header p{color:var(--txt2);font-size:12px;font-family:var(--mono);letter-spacing:1px}
.tabs{display:flex;gap:3px;padding:0 0 18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:rgba(255,255,255,.02);color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--mono);letter-spacing:1px;-webkit-tap-highlight-color:transparent}
.tab:hover{color:var(--txt);background:rgba(96,168,248,.06)}
.tab.active{background:rgba(96,168,248,.12);border-color:rgba(96,168,248,.4);color:var(--em)}
.card{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:22px;margin-bottom:12px;position:relative;z-index:1}
.card.em{border-top:2px solid var(--em)}
.card-title{font-family:var(--head);font-size:15px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.card-sub{color:var(--txt2);font-size:12px;margin-bottom:16px;line-height:1.65}

/* Espèce selector */
.espece-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.espece-btn{padding:14px 8px;border-radius:10px;border:1.5px solid var(--bdr);background:rgba(255,255,255,.02);cursor:pointer;text-align:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.espece-btn:hover{background:rgba(96,168,248,.06)}
.espece-btn.active{background:rgba(96,168,248,.1);border-color:rgba(96,168,248,.4)}
.espece-icon{font-size:26px;display:block;margin-bottom:5px}
.espece-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2)}
.espece-btn.active .espece-label{color:var(--em)}

/* Constantes display */
.cst-card{background:rgba(0,0,0,.25);border-radius:10px;padding:0;overflow:hidden;margin-bottom:10px}
.cst-header{background:rgba(96,168,248,.08);border-bottom:1px solid rgba(96,168,248,.15);padding:12px 16px;display:flex;align-items:center;gap:10px}
.cst-icon{font-size:20px}
.cst-nom{font-size:14px;font-weight:700;color:var(--em)}
.cst-methode{font-family:var(--mono);font-size:10px;color:var(--txt2);margin-left:auto;letter-spacing:1px}
.cst-body{padding:12px 16px}
.cst-values{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.cst-val{background:rgba(0,0,0,.2);border-radius:6px;padding:10px;text-align:center}
.cst-val-num{font-family:var(--head);font-size:18px;font-weight:800;display:block;line-height:1}
.cst-val-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);display:block;margin-top:3px}
.cst-alerte{font-size:11px;line-height:1.6;padding:8px 10px;border-radius:6px;margin-top:6px}
.cst-technique{font-size:12px;color:var(--txt2);line-height:1.7;padding:10px 14px;background:rgba(0,0,0,.15);border-top:1px solid rgba(255,255,255,.05)}

/* Slider glycémie interactif */
.gauge-bar{height:28px;border-radius:14px;overflow:hidden;margin:8px 0;
  background:linear-gradient(90deg,#7a1a1a 0%,#e84040 12%,#e8a030 20%,#40c878 28%,#40c878 55%,#e8a030 68%,#e84040 82%,#7a1a1a 100%);
  position:relative}
.gauge-needle{position:absolute;top:0;bottom:0;width:3px;background:#fff;
  border-radius:2px;box-shadow:0 0 8px rgba(255,255,255,.6);
  transition:left .4s cubic-bezier(.34,1.56,.64,1);transform:translateX(-50%)}
.gauge-zones{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--txt2);margin-top:4px}

/* Technique steps */
.tech-step{display:flex;gap:12px;padding:10px;border-radius:8px;background:rgba(0,0,0,.2);margin-bottom:6px;border-left:3px solid rgba(96,168,248,.4)}
.tech-num{font-family:var(--head);font-size:16px;font-weight:800;color:var(--em);flex-shrink:0;width:22px}
.tech-titre{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px}
.tech-desc{font-size:12px;color:var(--txt2);line-height:1.6}

/* Quiz */
.quiz-opt{padding:11px 14px;border-radius:8px;border:1.5px solid var(--bdr);background:rgba(255,255,255,.02);color:var(--txt2);cursor:pointer;font-size:13px;margin-bottom:7px;transition:all .15s;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent}
.quiz-opt:hover{background:rgba(96,168,248,.06);color:var(--txt)}
.quiz-opt.correct{background:rgba(64,200,120,.1);border-color:rgba(64,200,120,.4);color:var(--green)}
.quiz-opt.wrong{background:rgba(232,64,64,.1);border-color:rgba(232,64,64,.4);color:var(--red)}
.quiz-expl{background:rgba(96,168,248,.05);border:1px solid rgba(96,168,248,.15);border-radius:8px;padding:11px 13px;margin-top:10px;font-size:12px;color:var(--txt2);line-height:1.7}
.quiz-expl strong{color:var(--txt)}

.info{border-radius:8px;padding:10px 13px;font-size:12px;line-height:1.75;margin-bottom:10px}
.info-em  {background:rgba(96,168,248,.06);border-left:3px solid rgba(96,168,248,.5);color:var(--em)}
.info-warn{background:rgba(232,160,48,.06);border-left:3px solid rgba(232,160,48,.5);color:var(--amber)}
.info-red {background:rgba(232,64,64,.06);border-left:3px solid rgba(232,64,64,.5);color:var(--red)}
.info-green{background:rgba(64,200,120,.06);border-left:3px solid rgba(64,200,120,.5);color:var(--green)}
.info-violet{background:rgba(160,96,232,.06);border-left:3px solid rgba(160,96,232,.5);color:var(--violet)}

.btn-p{background:linear-gradient(135deg,var(--em2),var(--em));border:none;border-radius:8px;color:#fff;font-family:var(--head);font-size:13px;font-weight:700;padding:11px 22px;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:-0.3px}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,.04);border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt2);font-family:var(--sans);font-size:12px;font-weight:600;padding:9px 16px;cursor:pointer;transition:all .15s}
.btn-g:hover{background:rgba(96,168,248,.06);color:var(--txt)}
.btn-full{width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.progress-wrap{background:rgba(255,255,255,.06);border-radius:100px;height:7px;overflow:hidden;margin:6px 0}
.progress-bar{height:100%;border-radius:100px;transition:width .5s ease}
.dots{text-align:center;padding:22px 0}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--em);margin:0 3px;animation:dotB 1.4s ease-in-out infinite both}
.dots span:nth-child(2){animation-delay:.16s}.dots span:nth-child(3){animation-delay:.32s}
.dots-msg{color:var(--txt2);font-size:12px;margin-top:10px;font-style:italic}
.analysis p{margin-bottom:13px;font-size:14px;line-height:1.85;color:#4060a0}
.analysis strong{color:var(--txt)}
.apikey-box{background:rgba(96,168,248,.04);border:1px solid rgba(96,168,248,.12);border-radius:8px;padding:11px}
.apikey-box p{font-size:12px;color:var(--txt2);margin-bottom:9px;line-height:1.6}
.apikey-box a{color:var(--em)}
.apikey-row{display:flex;gap:6px}
.apikey-row input{flex:1;padding:8px 10px;font-size:11px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:6px;color:var(--txt);font-family:var(--mono);outline:none}
.apikey-row input:focus{border-color:rgba(96,168,248,.3)}
.apikey-row button{padding:8px 12px;border:none;border-radius:6px;background:var(--em2);color:#fff;font-weight:700;cursor:pointer;font-size:11px}
hr.div{border:none;border-top:1px solid rgba(255,255,255,.06);margin:14px 0}
.home-btn-fixed{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(10,12,16,.92);border:1.5px solid rgba(96,168,248,.3);border-radius:30px;padding:10px 22px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--em);cursor:pointer;text-decoration:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;white-space:nowrap}
.home-btn-fixed:hover{background:rgba(96,168,248,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotB{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.fadeup{animation:fadeUp .35s ease forwards}
@media(max-width:480px){.espece-grid{grid-template-columns:1fr 1fr}.cst-values{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════
//  DONNÉES UC4 — CONSTANTES VITALES
//  Sources : Temavet, ASVinfos, MonVet, papotagesduneasv, Alforme
//  CAFASV UC4 : "Assister le vétérinaire en soins et en chirurgie"
// ═══════════════════════════════════════

var ESPECES = [
  {id:'chien', label:'Chien', icon:'🐕', col:'#60a8f8'},

var CONSTANTES = {

    ],

      {signe:'FR > 40/min au repos', signif:'Détresse respiratoire — O₂ immédiat'},

    ],
    technique_fc:'Stéthoscope côté gauche (5ème espace intercostal) OU palpation artère fémorale face interne cuisse. Compter 15 sec × 4 ou 30 sec × 2.',

    temp: {min:38.0,max:39.2,unit:'°C',  alerte_bas:37.5,alerte_haut:39.5,label:'Température rectale'},
    pas:  {min:100, max:150, unit:'mmHg', alerte_bas:90,  alerte_haut:160, label:'PA systolique'},
    trc:  {min:0,   max:2,   unit:'sec',  alerte_bas:0,   alerte_haut:2,   label:'TRC (muqueuses)'},
    notes:[
      'Le chat en stress à la clinique peut avoir une FC et une T° artificiellement élevées (syndrome du manteau blanc)',
      'Chaton < 4 semaines : FC 180-200 bpm — incapable de thermorégulation seul',
      'Ronronnement n\'exclut pas la douleur — le chat ronronne aussi quand il souffre',
      'Un chat qui respire la bouche ouverte = signe de détresse respiratoire grave',
    ],
    urgences:[
      {signe:'Respiration bouche ouverte', signif:'Détresse respiratoire — urgence absolue'},
      {signe:'FC > 240 bpm + faiblesse', signif:'Tachycardie sévère ou cardiomyopathie'},
      {signe:'T° > 39.5°C', signif:'Fièvre — rechercher cause infectieuse'},
      {signe:'Paralysie des membres postérieurs', signif:'Thrombus aortique — urgence'},
      {signe:'Arrêt alimentaire > 24h', signif:'Risque lipidose hépatique — urgence'},
    ],
    technique_fc:'Stéthoscope côté gauche pointe du cœur. Chat posé sur la table ou tenu. Artère fémorale en alternative. Attention : le stress augmente beaucoup la FC du chat.',
    technique_fr:'De loin, sans toucher l\'animal, observer les flancs. Compter 1 minute. Un chat stressé peut avoir 40-50/min — tenir compte du contexte.',
    technique_temp:'Comme le chien — voie rectale. Le chat résiste souvent. Utiliser une contention douce. Thermomètre lubrifié, insertion 2 cm. Résultats souvent faussés par le stress.',

  },
  lapin: {
    nom:'Lapin', icon:'🐇',
    fc:   {min:130, max:325, unit:'bpm',  alerte_bas:120, alerte_haut:350, label:'Fréquence cardiaque'},
    fr:   {min:30,  max:60,  unit:'/min', alerte_bas:25,  alerte_haut:70,  label:'Fréquence respiratoire'},
    temp: {min:38.0,max:39.5,unit:'°C',  alerte_bas:37.5,alerte_haut:40.0,label:'Température rectale'},

      {signe:'Dyspnée (flancs qui bougent fort)', signif:'Urgence respiratoire'},
      {signe:'Paralysie ou parésie des membres', signif:'Fracture vertébrale ou atteinte neurologique'},
    ],
    technique_fc:'Stéthoscope côté gauche, lapin en décubitus dorsal ou tenu sur les bras. La FC est très rapide — compter 15 sec × 4. Artère auriculaire visible.',

  nac: {
    nom:'NAC (rongeurs / furet)', icon:'🐾',
    fc:   {min:200, max:400, unit:'bpm',  alerte_bas:180, alerte_haut:450, label:'FC (variable selon espèce)'},
    fr:   {min:40,  max:100, unit:'/min', alerte_bas:35,  alerte_haut:120, label:'FR (variable selon espèce)'},

    trc:  {min:0,   max:2,   unit:'sec',  alerte_bas:0,   alerte_haut:2,   label:'TRC (muqueuses)'},

    urgences:[
      {signe:'Arrêt alimentaire chez tout NAC', signif:'Urgence — les petits animaux se dégradent vite'},

      {signe:'Oiseau : plumes ébouriffées, yeux fermés', signif:'Animal très malade — urgence'},

// Techniques de mesure détaillées
var TECHNIQUES = [
  {id:'stethoscope', icon:'🩺', titre:'Auscultation au stéthoscope',
   desc:'Mesure de la FC et détection des souffles cardiaques, bruits pulmonaires anormaux.',
   steps:[
     {n:'1',t:'Préparation',d:'Stéthoscope à température ambiante. Animal calme si possible. Environnement silencieux.'},
     {n:'2',t:'Placement',d:'Pointe du cœur : côté gauche, 5ème espace intercostal, juste derrière le coude. Pression légère.'},

function md(t){return t.split('\n\n').filter(function(p){return p.trim();}).map(function(para){
  var parts=para.split(/\*\*([^*]+)\*\*/g);
  var inner=parts.map(function(p,i){return i%2===1?'<strong>'+esc(p)+'</strong>':esc(p);}).join('');

}

      var cls=''; if(S.qShown){if(i===q.rep)cls='correct'; else if(i===S.qSel)cls='wrong';}
      h += '<div class="quiz-opt '+cls+'" onclick="'+(S.qShown?'':'selQ('+i+')')+'">';
      h += '<span style="font-family:var(--mono);font-size:11px;flex-shrink:0">'+['A','B','C','D'][i]+'</span>';
      h += '<span>'+esc(opt)+'</span></div>';
    });
    if(S.qShown){
      h += '<div class="quiz-expl">'+q.expl.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</div>';
      h += '<button class="btn-p btn-full" style="margin-top:12px" onclick="nxtQ()">Question suivante →</button>';
    }
    h += '</div>';
    h += '<button class="btn-g btn-full" onclick="rstQ()" style="margin-top:8px;color:var(--em)">↺ Recommencer</button>';
    h += '</div>';

  // ── ANALYSE IA ─────────────────────────────────────────
  } else if(S.onglet === 'analyse'){
    h += '<div class="fadeup"><div class="card em">';
    h += '<div class="card-title" style="color:var(--em)">🤖 Analyse IA · Constantes vitales UC4</div>';
    h += '<div class="card-sub">Posez une question sur les constantes ou une situation clinique — l\'IA vous guide en tant que formateur CAFASV UC4.</div>';
    h += '<textarea id="ia-q" style="width:100%;min-height:80px;background:rgba(0,0,0,.4);border:1.5px solid rgba(96,168,248,.12);border-radius:8px;color:var(--txt);padding:11px;font-size:13px;font-family:var(--sans);outline:none;resize:vertical;line-height:1.6;margin-bottom:10px" placeholder="Ex: Un chat arrive avec une FC à 240 bpm et des muqueuses pâles. Quelle est ma conduite ? Ou : Quelle est la différence entre TRC et évaluation des muqueuses ?"></textarea>';
    h += '<button class="btn-p btn-full" onclick="runIA()">📊 Analyser cette situation →</button>';
    if(S.loading){h += '<div class="dots" style="margin-top:14px"><span></span><span></span><span></span><div class="dots-msg">Analyse en cours...</div></div>';}
    if(!S.loading && S.analyse){h += '<div class="analysis fadeup" style="margin-top:14px">'+md(S.analyse)+'</div>';}
    h += '<hr class="div">';
    if(!S.apiKeySaved){
      h += '<div class="apikey-box"><p>Clé API Anthropic. <a href="https://console.anthropic.com/" target="_blank">Obtenir →</a></p>';
      h += '<div class="apikey-row"><input type="password" placeholder="sk-ant-api03-..." value="'+esc(S.apiKey)+'" oninput="S.apiKey=this.value">';
      h += '<button onclick="svKey()">Sauver</button></div></div>';
    } else {h += '<div style="color:var(--green);font-family:var(--mono);font-size:11px">// configured ✓</div>';}
    h += '</div></div>';
  }

  if(S.view !== 'welcome'){
    h += '<div style="margin-top:10px;display:flex;gap:8px">';
    h += '<button class="btn-g" onclick="go(\'welcome\')" style="color:var(--em);border-color:rgba(96,168,248,.2)">← Accueil</button>';
    h += '<button class="btn-g" onclick="window.location.href=\'index.html\'">⌂ SimVeto</button>';
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('app').innerHTML = h;
}

function go(v){S.view=v; render(); window.scrollTo({top:0,behavior:'smooth'});}
function setO(o){S.onglet=o; S.analyse=''; render(); window.scrollTo({top:0,behavior:'smooth'});}
function selQ(i){if(S.qShown)return; S.qSel=i; S.qShown=true; S.qTotal++; if(i===QUIZ_UC4[S.qIdx%QUIZ_UC4.length].rep)S.qScore++; render();}
function nxtQ(){S.qIdx++; S.qSel=null; S.qShown=false; render(); window.scrollTo({top:0,behavior:'smooth'});}
function rstQ(){S.qIdx=0; S.qScore=0; S.qTotal=0; S.qSel=null; S.qShown=false; render();}
function svKey(){localStorage.setItem('simvitaux_key',S.apiKey); S.apiKeySaved=true; render();}

async function runIA(){
  var el = document.getElementById('ia-q');
  if(!el || !el.value.trim()) return;
  S.loading=true; S.analyse=''; render();
  try{
    var headers = {'Content-Type':'application/json'};
    if(S.apiKey){headers['x-api-key']=S.apiKey; headers['anthropic-version']='2023-06-01';}
    var res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        messages:[{role:'user',content:'Tu es formateur CAFASV expert en UC4 "Assister le veterinaire en soins et en chirurgie" (RNCP40344), specialiste des constantes vitales veterinaires. Question posee par une etudiante ASV : '+el.value+'\n\nAnalyse en 3 parties :\n**Interpretation clinique** — que signifient ces valeurs / ce tableau clinique\n**Conduite ASV** — que faire concretement, dans quel ordre\n**Perimetre UC4** — ce que fait l\'ASV vs ce que decide le veterinaire\n\nTutoie l\'etudiante. Donne les valeurs normales de reference. Cite les competences UC4 CAFASV concernees. Utilise **gras** pour les points cles.'}]})});
    var data = await res.json();
    if(data.error) throw new Error(data.error.message);
    S.analyse = data.content && data.content.find(function(b){return b.type==='text';}) ?
      data.content.find(function(b){return b.type==='text';}).text : '';
  }catch(e){S.analyse = '**Erreur**\n\n'+e.message;}
  S.loading=false; render();
}
render();
</script>
