<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PraxisAnesthVeto · UC4 CAFASV · PraxisVeto</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Karla:wght@300;400;500;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0a12;--card:rgba(255,255,255,.04);--bdr:rgba(255,255,255,.08);
  --txt:#e0d0f0;--txt2:#504080;--em:#c060f8;--em2:#8030c0;
  --amber:#e8a030;--red:#e84040;--green:#40c878;--blue:#40a8e0;--em3:#d090ff;
  --head:'Unbounded',sans-serif;--sans:'Karla',sans-serif;--mono:'Fira Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:80px;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(192,96,248,.07) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 80% 90%,rgba(64,168,224,.04) 0%,transparent 50%);
  background-image:
    repeating-linear-gradient(0deg,rgba(192,96,248,.015) 0px,rgba(192,96,248,.015) 1px,transparent 1px,transparent 60px),
    repeating-linear-gradient(90deg,rgba(192,96,248,.015) 0px,rgba(192,96,248,.015) 1px,transparent 1px,transparent 60px)}
.wrap{max-width:720px;margin:0 auto;padding:0 18px;position:relative;z-index:1}
.site-header{padding:40px 22px 24px;text-align:center;position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(192,96,248,.08);border:1px solid rgba(192,96,248,.22);color:var(--em3);padding:4px 16px;border-radius:20px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.site-header h1{font-family:var(--head);font-size:clamp(26px,5vw,48px);font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:8px}
.site-header h1 span{color:var(--em3)}
.site-header p{color:var(--txt2);font-size:12px;font-family:var(--mono);letter-spacing:1px}
.tabs{display:flex;gap:3px;padding:0 0 18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:rgba(255,255,255,.02);color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--mono);letter-spacing:1px;-webkit-tap-highlight-color:transparent}
.tab:hover{color:var(--txt);background:rgba(192,96,248,.06)}
.tab.active{background:rgba(192,96,248,.12);border-color:rgba(192,96,248,.4);color:var(--em3)}
.card{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:22px;margin-bottom:12px;position:relative;z-index:1}
.card.em{border-top:2px solid var(--em)}
.card-title{font-family:var(--head);font-size:15px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.card-sub{color:var(--txt2);font-size:12px;margin-bottom:16px;line-height:1.65}
.param-card{border-radius:10px;padding:0;overflow:hidden;margin-bottom:10px;background:rgba(0,0,0,.25)}
.param-header{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.param-icon{font-size:20px;flex-shrink:0}
.param-nom{font-size:14px;font-weight:700;flex:1}
.param-body{padding:14px 16px}
.param-values{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.param-val{background:rgba(0,0,0,.2);border-radius:6px;padding:10px;text-align:center}
.param-val-num{font-family:var(--head);font-size:17px;font-weight:800;display:block;line-height:1;margin-bottom:3px}
.param-val-lbl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);display:block}
.step-row{display:flex;gap:12px;padding:10px;border-radius:8px;background:rgba(0,0,0,.2);margin-bottom:6px;border-left:3px solid rgba(192,96,248,.4)}
.step-num{font-family:var(--head);font-size:16px;font-weight:800;color:var(--em3);flex-shrink:0;width:22px}
.step-titre{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px}
.step-desc{font-size:12px;color:var(--txt2);line-height:1.65}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:10px;overflow:hidden;margin-bottom:12px}
.role-col-head{padding:10px 14px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.role-col-item{padding:9px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}
.role-col-item:last-child{border-bottom:none}
.alarm-card{border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .18s}
.alarm-card:hover{filter:brightness(1.1)}
.alarm-titre{font-size:13px;font-weight:700;margin-bottom:3px}
.alarm-desc{font-size:12px;line-height:1.65;display:none}
.alarm-card.open .alarm-desc{display:block;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.08)}
.quiz-opt{padding:11px 14px;border-radius:8px;border:1.5px solid var(--bdr);background:rgba(255,255,255,.02);color:var(--txt2);cursor:pointer;font-size:13px;margin-bottom:7px;transition:all .15s;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent}
.quiz-opt:hover{background:rgba(192,96,248,.06);color:var(--txt)}
.quiz-opt.correct{background:rgba(64,200,120,.1);border-color:rgba(64,200,120,.4);color:var(--green)}
.quiz-opt.wrong{background:rgba(232,64,64,.1);border-color:rgba(232,64,64,.4);color:var(--red)}
.quiz-expl{background:rgba(192,96,248,.05);border:1px solid rgba(192,96,248,.15);border-radius:8px;padding:11px 13px;margin-top:10px;font-size:12px;color:var(--txt2);line-height:1.7}
.quiz-expl strong{color:var(--txt)}
.info{border-radius:8px;padding:10px 13px;font-size:12px;line-height:1.75;margin-bottom:10px}
.info-em  {background:rgba(192,96,248,.06);border-left:3px solid rgba(192,96,248,.5);color:var(--em3)}
.info-warn{background:rgba(232,160,48,.06);border-left:3px solid rgba(232,160,48,.5);color:var(--amber)}
.info-red {background:rgba(232,64,64,.06);border-left:3px solid rgba(232,64,64,.5);color:var(--red)}
.info-green{background:rgba(64,200,120,.06);border-left:3px solid rgba(64,200,120,.5);color:var(--green)}
.info-blue{background:rgba(64,168,224,.06);border-left:3px solid rgba(64,168,224,.5);color:var(--blue)}
.btn-p{background:linear-gradient(135deg,var(--em2),var(--em));border:none;border-radius:8px;color:#fff;font-family:var(--head);font-size:13px;font-weight:700;padding:11px 22px;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:-0.3px}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,.04);border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt2);font-family:var(--sans);font-size:12px;font-weight:600;padding:9px 16px;cursor:pointer;transition:all .15s}
.btn-g:hover{background:rgba(192,96,248,.06);color:var(--txt)}
.btn-full{width:100%}
.progress-wrap{background:rgba(255,255,255,.06);border-radius:100px;height:7px;overflow:hidden;margin:6px 0}
.progress-bar{height:100%;border-radius:100px;transition:width .5s ease}
.dots{text-align:center;padding:22px 0}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--em);margin:0 3px;animation:dotB 1.4s ease-in-out infinite both}
.dots span:nth-child(2){animation-delay:.16s}.dots span:nth-child(3){animation-delay:.32s}
.dots-msg{color:var(--txt2);font-size:12px;margin-top:10px;font-style:italic}
.analysis p{margin-bottom:13px;font-size:14px;line-height:1.85;color:#6040a0}
.analysis strong{color:var(--txt)}
.apikey-box{background:rgba(192,96,248,.04);border:1px solid rgba(192,96,248,.12);border-radius:8px;padding:11px}
.apikey-box p{font-size:12px;color:var(--txt2);margin-bottom:9px;line-height:1.6}
.apikey-box a{color:var(--em3)}
.apikey-row{display:flex;gap:6px}
.apikey-row input{flex:1;padding:8px 10px;font-size:11px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:6px;color:var(--txt);font-family:var(--mono);outline:none}
.apikey-row input:focus{border-color:rgba(192,96,248,.3)}
.apikey-row button{padding:8px 12px;border:none;border-radius:6px;background:var(--em2);color:#fff;font-weight:700;cursor:pointer;font-size:11px}
hr.div{border:none;border-top:1px solid rgba(255,255,255,.06);margin:14px 0}
.home-btn-fixed{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(12,10,18,.92);border:1.5px solid rgba(192,96,248,.3);border-radius:30px;padding:10px 22px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--em3);cursor:pointer;text-decoration:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;white-space:nowrap}
.home-btn-fixed:hover{background:rgba(192,96,248,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotB{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.fadeup{animation:fadeUp .35s ease forwards}
@media(max-width:480px){.param-values{grid-template-columns:1fr 1fr}.role-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════
//  DONNÉES UC4 — ANESTHÉSIE VÉTÉRINAIRE
//  Rôle de l'ASV : préparation, monitoring, réveil
//  Sources : Point Vétérinaire, OnlyVet, WSAVA 2010
//  CAFASV UC4 · Loi d'orientation agricole février 2025
// ═══════════════════════════════════════

// Cadre légal — important
var CADRE_LEGAL = {
  actuel: [
    'Préparer le matériel d\'anesthésie selon les instructions du vétérinaire',
    'Préparer les seringues de prémédication sur prescription écrite du vétérinaire',
    'Brancher et vérifier le fonctionnement du monitoring',
    'Surveiller les paramètres peropératoires et tracer toutes les 5 min',
    'Alerter immédiatement le vétérinaire en cas d\'anomalie',
    'Assurer la thermorégulation peropératoire (couvertures, matelas chauffant)',
    'Surveiller l\'animal au réveil — assurer les soins de confort',
    'Noter les paramètres sur la feuille anesthésique',
  ],
  loi2025:[
    'Administrer les injections de prémédication sur protocole écrit (sous certification)',
    'Poser un cathéter intraveineux (sous certification)',
    'Administrer certains médicaments sur protocole (sous certification)',
    'Assister formellement à l\'anesthésie selon liste d\'actes à paraître',
  ],
  jamais:[
    'Décider du protocole anesthésique',
    'Choisir ou modifier les molécules et doses',
    'Intuber l\'animal',
    'Modifier le niveau d\'anesthésie (régler le vaporiseur)',
    'Agir sans vétérinaire présent sur site',
    'Administrer des stupéfiants ou médicaments à usage vétérinaire exclusif',
  ],
};

// Paramètres de monitoring peropératoire
var PARAMS_MONITORING = [
  {
    id:'spo2', icon:'💨', nom:'SpO₂ — Saturation en O₂',
    col:'#40a8e0', bgCol:'rgba(64,168,224,.08)',
    normal:{val:'95-100%', label:'Normal'},
    warn:{val:'94-95%', label:'Vigilance'},
    crit:{val:'< 94%', label:'Hypoxémie'},
    signif:'Pourcentage d\'hémoglobine oxygénée. Mesurée par oxymètre de pouls (pince sur langue, lèvre, oreille, prépuce, vulve). Premier paramètre à surveiller.',
    alarme:'SpO₂ < 94% = hypoxémie. Vérifier la sonde, le circuit, la ventilation. Alerter le vétérinaire. Augmenter le débit O₂ sur indication vétérinaire.',
    capteur:'Langue (le plus fiable) · Lèvres · Oreille · Prépuce/vulve · Pied',
  },
  {
    id:'etco2', icon:'💨', nom:'EtCO₂ — CO₂ en fin d\'expiration',
    col:'#c060f8', bgCol:'rgba(192,96,248,.08)',
    normal:{val:'35-45 mmHg', label:'Normal'},
    warn:{val:'45-60 mmHg', label:'Hypercapnie légère'},
    crit:{val:'> 60 mmHg', label:'Hypercapnie sévère'},
    signif:'Reflet de la PaCO₂ artérielle. Mesurée par capnographe sur le circuit respiratoire. Détecte les défauts de ventilation avant la SpO₂.',
    alarme:'EtCO₂ > 60 mmHg = hypercapnie sévère — ventilation insuffisante. Chute brutale = obstruction voies aériennes ou arrêt. Alerter immédiatement.',
    capteur:'Capnographe branché sur sonde d\'intubation ou masque',
  },
  {
    id:'fc', icon:'❤️', nom:'FC — Fréquence cardiaque',
    col:'#e84040', bgCol:'rgba(232,64,64,.08)',
    normal:{val:'60-140 bpm', label:'Normal chien'},
    warn:{val:'< 50 ou > 150', label:'Bradycardie / Tachy'},
    crit:{val:'< 40 ou > 180', label:'Urgence'},
    signif:'Via ECG ou oxymètre. Bradycardie fréquente sous anesthésie (effet des drogues). Tachycardie = douleur, réveil, hypovolémie. Surveiller aussi le rythme.',
    alarme:'Bradycardie sévère < 40 bpm ou arythmie = alerter le vétérinaire immédiatement. Ne jamais modifier la perfusion seule.',
    capteur:'ECG (3 électrodes) · Oxymètre de pouls · Stéthoscope oesophagien',
  },
  {
    id:'temp', icon:'🌡️', nom:'Température corporelle',
    col:'#e8a030', bgCol:'rgba(232,160,48,.08)',
    normal:{val:'37.5-39.2°C', label:'Normal chien'},
    warn:{val:'< 37°C', label:'Hypothermie débutante'},
    crit:{val:'< 36°C', label:'Hypothermie sévère'},
    signif:'L\'hypothermie est quasi-systématique sous anesthésie. Elle prolonge le réveil, favorise les arythmies et augmente le risque d\'infection. Prévention obligatoire.',
    alarme:'T° < 36°C = réchauffer activement. Couverture de survie, matelas chauffant, liquides tièdes. Ne jamais utiliser de bouillotte (risque brûlure). Alerter si < 35°C.',
    capteur:'Sonde rectale · Sonde oesophagienne (plus précise) · Mesure toutes les 5 min',
  },
  {
    id:'pa', icon:'🩸', nom:'Pression artérielle (PA)',
    col:'#40c878', bgCol:'rgba(64,200,120,.08)',
    normal:{val:'PAS 90-150 mmHg', label:'Normal'},
    warn:{val:'PAS < 80 mmHg', label:'Hypotension'},
    crit:{val:'PAS < 60 mmHg', label:'Choc peropératoire'},
    signif:'L\'hypotension est la complication la plus fréquente sous anesthésie. Causée par les drogues anesthésiques. Risque d\'ischémie des organes si prolongée.',
    alarme:'PAS < 80 mmHg persistante = alerter le vétérinaire. Positionnement, bolus liquidien sur indication vétérinaire. Pas de décision autonome.',
    capteur:'Brassard oscillométrique · Doppler vasculaire · Taille brassard adaptée au patient',
  },
  {
    id:'fr', icon:'🫁', nom:'Fréquence respiratoire (FR)',
    col:'#40a8e0', bgCol:'rgba(64,168,224,.06)',
    normal:{val:'8-20 /min', label:'Normal sous anesthésie'},
    warn:{val:'< 6 ou > 25', label:'Vigilance'},
    crit:{val:'Apnée (0 /min)', label:'Urgence absolue'},
    signif:'Sous anesthésie gazeuse, la FR est souvent réduite. L\'apnée est une urgence. Compter les mouvements du ballon réservoir du circuit anesthésique.',
    alarme:'Apnée : ventiler manuellement sur le ballon immédiatement, alerter le vétérinaire. FR > 25 avec distension abdominale = réveil débutant ou douleur.',
    capteur:'Observation du ballon réservoir · Capnographe · Détecteur d\'apnée',
  },
];

// Feuille anesthésique
var FEUILLE_ANESTH = [
  {t:'Identification', d:'Nom animal, espèce, race, sexe, âge, poids, numéro de dossier, nom du vétérinaire'},
  {t:'Prémédication', d:'Heure, molécules, doses, voie d\'administration — rempli par le vétérinaire ou sous sa dictée'},
  {t:'Induction', d:'Heure, molécule, dose, heure d\'intubation — acte vétérinaire'},
  {t:'Paramètres peropératoires', d:'Toutes les 5 minutes : FC, FR, SpO₂, EtCO₂, PA, T° — rempli par l\'ASV'},
  {t:'Médicaments peropératoires', d:'Bolus, sédations complémentaires — sur prescription vétérinaire'},
  {t:'Réveil', d:'Heure d\'extubation, heure de déambulation, retour à la conscience, T° de sortie de réveil'},
  {t:'Incidents', d:'Toute anomalie, alarme, intervention — tracée avec heure précise'},
];

// Alarmes courantes
var ALARMES = [
  {id:'a1', icon:'💨', titre:'SpO₂ < 94%', urgence:true, col:'rgba(232,64,64,.08)', bord:'var(--red)',
   cause:'Obstruction des voies aériennes · Sonde d\'intubation déplacée · Déconnexion circuit · Hypoventilation · Bronchospasme',
   asv:'1. Vérifier la sonde (non coudée, non déplacée) · 2. Vérifier le circuit (pas de fuite) · 3. Alerter le vétérinaire · 4. Ne pas modifier le vaporiseur seule'},
  {id:'a2', icon:'❤️', titre:'Bradycardie < 40 bpm', urgence:true, col:'rgba(232,64,64,.08)', bord:'var(--red)',
   cause:'Surdosage anesthésique · Effet vagal · Hypothermie · Hypoxie · Effet morphiniques',
   asv:'Alerter immédiatement le vétérinaire. Vérifier la T°. Signaler si le chirurgien effectue une traction sur organe abdominal (réflexe vago-vagal). Ne rien modifier seule.'},
  {id:'a3', icon:'🫁', titre:'Apnée (absence de mouvements respiratoires)', urgence:true, col:'rgba(232,64,64,.08)', bord:'var(--red)',
   cause:'Surdosage · Obstruction · Déconnexion sonde · Position (compression thorax)',
   asv:'Ventiler manuellement via le ballon réservoir du circuit immédiatement. Alerter le vétérinaire. Vérifier connexions. Compter les insufflations (1 toutes les 5 sec).'},
  {id:'a4', icon:'🌡️', titre:'T° < 36°C — Hypothermie', urgence:false, col:'rgba(232,160,48,.08)', bord:'var(--amber)',
   cause:'Anesthésiques (vasodilatation) · Longue chirurgie · Petite taille · Abdomen ouvert · Liquides froids',
   asv:'Couverture de survie dorée (côté aluminisé vers l\'animal). Matelas chauffant à air pulsé. Liquides de perfusion tièdes. Réduire la surface abdominale exposée. Surveiller toutes les 5 min.'},
  {id:'a5', icon:'🩸', titre:'Hypotension — PAS < 80 mmHg', urgence:false, col:'rgba(232,160,48,.08)', bord:'var(--amber)',
   cause:'Effet vasodilatateur des drogues · Hypovolémie · Surdosage · Position (Trendelenburg inverse)',
   asv:'Alerter le vétérinaire. Augmenter le débit de perfusion sur indication vétérinaire. Vérifier position de l\'animal. Ne pas modifier le protocole anesthésique seule.'},
  {id:'a6', icon:'💨', titre:'EtCO₂ > 60 mmHg', urgence:false, col:'rgba(232,160,48,.08)', bord:'var(--amber)',
   cause:'Hypoventilation · Débit O₂ trop faible · Chaux sodée saturée · Espace mort trop important',
   asv:'Alerter le vétérinaire. Vérifier le circuit. Vérifier l\'état de la chaux sodée (indicateur coloré). Augmenter la ventilation sur indication vétérinaire.'},
];

// Protocole réveil
var PROTOCOLE_REVEIL = [
  {n:'1', t:'Arrêt du gaz anesthésique', d:'Sur décision du vétérinaire en fin d\'intervention. L\'ASV maintient le débit O₂ pur jusqu\'à extubation.'},
  {n:'2', t:'Surveillance active du réveil', d:'L\'ASV reste à côté de l\'animal en permanence. Surveiller FC, SpO₂, T°, réflexes (palpébral, déglutition).'},
  {n:'3', t:'Extubation', d:'Lorsque le réflexe de déglutition revient — sur indication du vétérinaire. Dégonfler le ballonnet avant de retirer. Ne jamais extruber en l\'absence du réflexe.'},
  {n:'4', t:'Position de sécurité', d:'Animal en décubitus sternal ou latéral selon l\'espèce. Tête légèrement basse pour éviter les fausses routes. Langue en dehors pour les petits animaux.'},
  {n:'5', t:'Thermorégulation', d:'Couverture maintenue. Matelas chauffant si T° < 37°C. Prendre T° toutes les 10 min jusqu\'à retour à la normale.'},
  {n:'6', t:'Analgésie post-op', d:'Sur prescription vétérinaire. L\'ASV administre selon le protocole écrit. Évaluer la douleur (échelle UNESP ou Glasgow pour chiens).'},
  {n:'7', t:'Surveillance et traçabilité', d:'Noter l\'heure d\'extubation, l\'heure de déambulation, la T° de sortie, l\'état général. Informer le vétérinaire à chaque changement d\'état.'},
];

// Quiz
var QUIZ_ANESTH = [
  {q:'Quelle est la valeur normale de SpO₂ chez un animal sous anesthésie ?',
   opts:['80-90%','90-94%','95-100%','100% exclusivement'],rep:2,
   expl:'La **SpO₂ normale sous anesthésie est de 95-100%**. Une SpO₂ < 94% signe une hypoxémie et doit déclencher une alerte immédiate au vétérinaire. L\'ASV vérifie en premier la sonde et le circuit avant d\'interpréter la valeur.'},
  {q:'L\'EtCO₂ normal sous anesthésie est de :',
   opts:['10-20 mmHg','20-30 mmHg','35-45 mmHg','60-80 mmHg'],rep:2,
   expl:'L\'**EtCO₂ normal est de 35-45 mmHg**. Il reflète directement le CO₂ artériel et permet de détecter les défauts de ventilation avant même que la SpO₂ ne chute. Un EtCO₂ > 60 mmHg = hypercapnie sévère nécessitant une ventilation assistée sur décision vétérinaire.'},
  {q:'Un animal sous anesthésie ne respire plus. Que fait l\'ASV EN PREMIER ?',
   opts:[
     'Alerter le vétérinaire et attendre ses instructions',
     'Intuber l\'animal si elle sait faire',

    h+='<div style="margin-top:10px;display:flex;gap:8px">';
    h+='<button class="btn-g" onclick="go(\'welcome\')" style="color:var(--em3);border-color:rgba(192,96,248,.2)">← Accueil</button>';
    h+='<button class="btn-g" onclick="window.location.href=\'index.html\'">⌂ PraxisVeto</button>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

function go(v){S.view=v;render();window.scrollTo({top:0,behavior:'smooth'});}
function setO(o){S.onglet=o;S.analyse='';render();window.scrollTo({top:0,behavior:'smooth'});}
function selQ(i){if(S.qShown)return;S.qSel=i;S.qShown=true;S.qTotal++;if(i===QUIZ_ANESTH[S.qIdx%QUIZ_ANESTH.length].rep)S.qScore++;render();}
function nxtQ(){S.qIdx++;S.qSel=null;S.qShown=false;render();window.scrollTo({top:0,behavior:'smooth'});}
function rstQ(){S.qIdx=0;S.qScore=0;S.qTotal=0;S.qSel=null;S.qShown=false;render();}
function svKey(){localStorage.setItem('simanesth_key',S.apiKey);S.apiKeySaved=true;render();}

async function runIA(){
  var el=document.getElementById('ia-q');
  if(!el||!el.value.trim())return;
  S.loading=true;S.analyse='';render();
  try{
    var headers={'Content-Type':'application/json'};
    if(S.apiKey){headers['x-api-key']=S.apiKey;headers['anthropic-version']='2023-06-01';}
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        messages:[{role:'user',content:'Tu es formateur CAFASV expert en UC4 anesthesie veterinaire (RNCP40344). Le perimetre de l\'ASV en France : surveillance et monitoring, pas de modification de protocole seule, veto toujours present sur site. Loi 2025 en cours de decret. Question ASV : '+el.value+'\n\nReponds en 3 parties :\n**Interpretation** — que signifie cette situation\n**Conduite ASV** — que faire, dans quel ordre, avec quelles limites\n**A alerter / ne pas faire** — ce qui releve du veto\n\nTutoie. Cite les valeurs normales. Rappelle le perimetre legal. **Gras** pour points cles.'}]})});
    var data=await res.json();
    if(data.error)throw new Error(data.error.message);
    S.analyse=data.content&&data.content.find(function(b){return b.type==='text';})?data.content.find(function(b){return b.type==='text';}).text:'';
  }catch(e){S.analyse='**Erreur**\n\n'+e.message;}
  S.loading=false;render();
}
render();
</script>
