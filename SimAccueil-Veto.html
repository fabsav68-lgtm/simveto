<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimAccueil · UC1 CAFASV · SimVeto</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Karla:wght@300;400;500;600&family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0a14;--card:rgba(255,255,255,.04);--bdr:rgba(255,255,255,.08);
  --txt:#e0d0f8;--txt2:#5040a0;--em:#a060f8;--em2:#7030d0;
  --amber:#e8a030;--red:#e84040;--em3:#c090ff;--green:#40c878;
  --head:'Unbounded',sans-serif;--sans:'Karla',sans-serif;--mono:'Fira Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:80px;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(160,96,248,.07) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 80% 90%,rgba(192,144,255,.04) 0%,transparent 50%);
  background-image:
    repeating-linear-gradient(0deg,rgba(160,96,248,.015) 0px,rgba(160,96,248,.015) 1px,transparent 1px,transparent 60px),
    repeating-linear-gradient(90deg,rgba(160,96,248,.015) 0px,rgba(160,96,248,.015) 1px,transparent 1px,transparent 60px)}
.wrap{max-width:720px;margin:0 auto;padding:0 18px;position:relative;z-index:1}
.site-header{padding:40px 22px 24px;text-align:center;position:relative;z-index:1}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(160,96,248,.08);border:1px solid rgba(160,96,248,.22);color:var(--em3);padding:4px 16px;border-radius:20px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.site-header h1{font-family:var(--head);font-size:clamp(26px,5vw,48px);font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:8px}
.site-header h1 span{color:var(--em3)}
.site-header p{color:var(--txt2);font-size:12px;font-family:var(--mono);letter-spacing:1px}
.tabs{display:flex;gap:3px;padding:0 0 18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:rgba(255,255,255,.02);color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--mono);letter-spacing:1px;-webkit-tap-highlight-color:transparent}
.tab:hover{color:var(--txt);background:rgba(160,96,248,.06)}
.tab.active{background:rgba(160,96,248,.12);border-color:rgba(160,96,248,.4);color:var(--em3)}
.card{background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;padding:22px;margin-bottom:12px;position:relative;z-index:1}
.card.em{border-top:2px solid var(--em)}
.card-title{font-family:var(--head);font-size:15px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.card-sub{color:var(--txt2);font-size:12px;margin-bottom:16px;line-height:1.65}
.scenario{background:rgba(0,0,0,.25);border-radius:10px;padding:16px;margin-bottom:10px;border-left:3px solid var(--em)}
.scenario-titre{font-family:var(--head);font-size:14px;font-weight:700;color:var(--em3);margin-bottom:6px}
.scenario-ctx{font-size:13px;color:var(--txt2);line-height:1.7;margin-bottom:10px;background:rgba(0,0,0,.2);border-radius:6px;padding:10px}
.scenario-q{font-size:13px;font-weight:600;color:var(--txt);font-style:italic;margin-bottom:8px}
.scenario-rep{background:rgba(160,96,248,.06);border:1px solid rgba(160,96,248,.15);border-radius:8px;padding:12px;font-size:12px;color:var(--txt2);line-height:1.7;display:none}
.scenario-rep.visible{display:block}
.scenario-rep strong{color:var(--txt)}
.item-row{display:flex;gap:12px;padding:10px 12px;border-radius:8px;background:rgba(0,0,0,.2);margin-bottom:6px;border-left:3px solid rgba(160,96,248,.35);cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent}
.item-row:hover{background:rgba(0,0,0,.3)}
.item-row.open{border-left-color:var(--em3)}
.item-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.item-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px}
.item-sub{font-size:12px;color:var(--txt2);line-height:1.6}
.item-detail{font-size:12px;color:var(--txt2);line-height:1.7;display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.item-row.open .item-detail{display:block}
.quiz-opt{padding:11px 14px;border-radius:8px;border:1.5px solid var(--bdr);background:rgba(255,255,255,.02);color:var(--txt2);cursor:pointer;font-size:13px;margin-bottom:7px;transition:all .15s;display:flex;align-items:center;gap:10px;-webkit-tap-highlight-color:transparent}
.quiz-opt:hover{background:rgba(160,96,248,.06);color:var(--txt)}
.quiz-opt.correct{background:rgba(64,200,120,.1);border-color:rgba(64,200,120,.4);color:var(--green)}
.quiz-opt.wrong{background:rgba(232,64,64,.1);border-color:rgba(232,64,64,.4);color:var(--red)}
.quiz-expl{background:rgba(160,96,248,.05);border:1px solid rgba(160,96,248,.15);border-radius:8px;padding:11px 13px;margin-top:10px;font-size:12px;color:var(--txt2);line-height:1.7}
.quiz-expl strong{color:var(--txt)}
.info{border-radius:8px;padding:10px 13px;font-size:12px;line-height:1.75;margin-bottom:10px}
.info-em  {background:rgba(160,96,248,.06);border-left:3px solid rgba(160,96,248,.5);color:var(--em3)}
.info-warn{background:rgba(232,160,48,.06);border-left:3px solid rgba(232,160,48,.5);color:var(--amber)}
.info-red {background:rgba(232,64,64,.06);border-left:3px solid rgba(232,64,64,.5);color:var(--red)}
.info-green{background:rgba(64,200,120,.06);border-left:3px solid rgba(64,200,120,.5);color:var(--green)}
.btn-p{background:linear-gradient(135deg,var(--em2),var(--em));border:none;border-radius:8px;color:#fff;font-family:var(--head);font-size:13px;font-weight:700;padding:11px 22px;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:-0.3px}
.btn-p:hover{opacity:.9;transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,.04);border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt2);font-family:var(--sans);font-size:12px;font-weight:600;padding:9px 16px;cursor:pointer;transition:all .15s}
.btn-g:hover{background:rgba(160,96,248,.06);color:var(--txt)}
.btn-full{width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.progress-wrap{background:rgba(255,255,255,.06);border-radius:100px;height:7px;overflow:hidden;margin:6px 0}
.progress-bar{height:100%;border-radius:100px;transition:width .5s ease}
.dots{text-align:center;padding:22px 0}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--em);margin:0 3px;animation:dotB 1.4s ease-in-out infinite both}
.dots span:nth-child(2){animation-delay:.16s}.dots span:nth-child(3){animation-delay:.32s}
.dots-msg{color:var(--txt2);font-size:12px;margin-top:10px;font-style:italic}
.analysis p{margin-bottom:13px;font-size:14px;line-height:1.85;color:#6050a0}
.analysis strong{color:var(--txt)}
.apikey-box{background:rgba(160,96,248,.04);border:1px solid rgba(160,96,248,.12);border-radius:8px;padding:11px}
.apikey-box p{font-size:12px;color:var(--txt2);margin-bottom:9px;line-height:1.6}
.apikey-box a{color:var(--em3)}
.apikey-row{display:flex;gap:6px}
.apikey-row input{flex:1;padding:8px 10px;font-size:11px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:6px;color:var(--txt);font-family:var(--mono);outline:none}
.apikey-row input:focus{border-color:rgba(160,96,248,.3)}
.apikey-row button{padding:8px 12px;border:none;border-radius:6px;background:var(--em2);color:#fff;font-weight:700;cursor:pointer;font-size:11px}
hr.div{border:none;border-top:1px solid rgba(255,255,255,.06);margin:14px 0}
.home-btn-fixed{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(13,10,20,.92);border:1.5px solid rgba(160,96,248,.3);border-radius:30px;padding:10px 22px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--em3);cursor:pointer;text-decoration:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.5);transition:all .2s;white-space:nowrap}
.home-btn-fixed:hover{background:rgba(160,96,248,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotB{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.fadeup{animation:fadeUp .35s ease forwards}
@media(max-width:480px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════
//  DONNÉES UC1 CAFASV — RNCP40344
//  "Conseiller la clientèle du vétérinaire"
//  Sources : CAFASV, Via Compétences, ASVinfos, Convention Collective Nationale vétérinaire
// ═══════════════════════════════════════

// Compétences UC1 officielles
var COMPETENCES_UC1 = [
  {id:'c1', icon:'🏥', titre:'Accueillir et identifier les besoins du client',
   tag:'UC1-1',
   desc:'Accueil physique et téléphonique. Identification du motif de visite. Écoute active. Orientation vers le bon interlocuteur. Gestion du planning de rendez-vous.',
   asv:'Saluer, se présenter, sourire. Identifier le motif en 2-3 questions ouvertes. Proposer un RDV adapté à l\'urgence réelle. Ne jamais faire attendre sans explication.',
   ne_pas:'Diagnostiquer par téléphone. Promettre un résultat. Minimiser une urgence sans avis vétérinaire.'},
  {id:'c2', icon:'📞', titre:'Identifier et trier les situations d\'urgence',
   tag:'UC1-2',
   desc:'Reconnaître par téléphone ou à l\'accueil les signes d\'urgence vitale. Informer le vétérinaire. Conseiller le propriétaire sur les mesures conservatoires pendant le transport.',
   asv:'Poser les 4 questions clés : depuis quand ? Mange-t-il/elle ? Conscient(e) ? A-t-il/elle du mal à respirer ? Selon les réponses : RDV immédiat, urgence ou conseil de surveillance.',
   ne_pas:'Décider seule du caractère urgent sans en référer au vétérinaire. Rassurer sans avoir évalué.'},
  {id:'c3', icon:'🍽️', titre:'Conseiller en nutrition',
   tag:'UC1-3',
   desc:'Alimentation adaptée à l\'espèce, l\'âge, le stade physiologique (gestation, croissance, senior), le poids et la condition corporelle. Croquettes, pâtées, BARF, régimes vétérinaires.',
   asv:'Connaître les gammes disponibles en clinique. Recommander en accord avec les préconisations du vétérinaire. Expliquer les différences qualitatives. Ne jamais critiquer un choix du client.',
   ne_pas:'Prescrire un régime thérapeutique sans vétérinaire. Promettre une guérison via l\'alimentation.'},
  {id:'c4', icon:'🪲', titre:'Conseiller en antiparasitaires',
   tag:'UC1-4',
   desc:'Prévention puces, tiques, vers (endoparasites et ectoparasites). Fréquence selon le mode de vie et l\'âge. Protocoles antiparasitaires internes (vermifuge) et externes (pipette, collier, spray).',
   asv:'Identifier le mode de vie (animal sortant/sédentaire, contact enfants). Proposer le protocole adapté. Rappeler la fréquence. Délivrer uniquement les produits sans ordonnance selon liste validée.',
   ne_pas:'Délivrer des antiparasitaires sur ordonnance sans prescription valide. Conseiller un produit non adapté au poids ou à l\'espèce.'},
  {id:'c5', icon:'📋', titre:'Informer sur la réglementation',
   tag:'UC1-5',
   desc:'Identification obligatoire (puce, tatouage). Vaccination (rage obligatoire si voyage). Déclaration de naissances. Passeport européen pour animaux. Certificats sanitaires à l\'export.',
   asv:'Informer sans interpréter la loi. Orienter vers le vétérinaire pour tout ce qui relève d\'un acte ou d\'une décision médicale. Fournir les documents réglementaires disponibles.',
   ne_pas:'Valider une démarche administrative médicale sans le vétérinaire. Signer des documents officiels.'},
  {id:'c6', icon:'💬', titre:'Désamorcer les situations conflictuelles',
   tag:'UC1-6',
   desc:'Communication non-violente (CNV). Gestion de la colère, de la détresse, du deuil. Empathie sans fusion. Limites professionnelles. Escalade vers le vétérinaire si nécessaire.',
   asv:'Écouter sans couper. Reformuler. Reconnaître l\'émotion sans valider les reproches injustes. Proposer une solution concrète. Escalader vers le vétérinaire si nécessaire.',
   ne_pas:'Rentrer dans le conflit. S\'excuser pour des décisions médicales. Prendre parti contre le vétérinaire.'},
  {id:'c7', icon:'💰', titre:'Établir et expliquer les devis',
   tag:'UC1-7',
   desc:'Présenter un devis détaillé et lisible. Expliquer chaque poste. Gérer les questions sur les tarifs sans gêne. Proposer des solutions (assurance, facilités de paiement selon politique clinique).',
   asv:'Connaître les tarifs de la clinique. Présenter le devis calmement. Ne pas s\'excuser des prix. Proposer des alternatives si disponibles. En cas de contestation : escalader au vétérinaire responsable.',
   ne_pas:'Décider seule d\'une remise. Promettre un prix sans validation. Critiquer les tarifs de la clinique.'},
  {id:'c8', icon:'🌐', titre:'Contribuer à la communication de la clinique',
   tag:'UC1-8',
   desc:'Réseaux sociaux de la clinique (si délégation du vétérinaire responsable). Rappels clients. Newsletters. Affichage. Image de marque de l\'établissement.',
   asv:'Publier uniquement sur validation du vétérinaire responsable. Respecter la confidentialité (jamais de photo identifiable d\'un client ou animal sans consentement). Représenter l\'image de la clinique.',
   ne_pas:'Publier des informations médicales sans validation. Photographier des patients sans consentement. Partager des données clients sur réseaux.'},
];

// Conseil nutrition détaillé
var NUTRITION_GUIDE = [
  {espece:'🐕 Chien', etapes:[
    {age:'Chiot (< 1 an)', alim:'Croquettes croissance · Morceaux adaptés à la taille de race · 3 repas/j jusqu\'à 6 mois'},
    {age:'Adulte (1-7 ans)', alim:'Croquettes maintenance · 2 repas/j · Adaptation au niveau d\'activité'},
    {age:'Senior (> 7 ans)', alim:'Croquettes senior · Protéines digestibles · Moins calorique · Surveillance rénale'},
    {age:'Femelle gestante/allaitante', alim:'Alimentation croissance ou maternité · Augmentation progressive · 3-4 repas/j'},
  ]},
  {espece:'🐈 Chat', etapes:[
    {age:'Chaton (< 12 mois)', alim:'Croquettes croissance chat · Alimentation mixte acceptée · Ad libitum jusqu\'à 6 mois'},
    {age:'Adulte (1-10 ans)', alim:'Croquettes maintenance · Hydratation importante (chat peu buveur) · Pâtée conseillée'},
    {age:'Senior / Stérilisé', alim:'Croquettes stérilisé ou senior · Contrôle poids ++ · Surveillance rénale et thyroïdienne'},
  ]},
];

// Antiparasitaires
var ANTIPARASITAIRES = [
  {type:'Ectoparasites — Puces', freq:'Mensuel toute l\'année si sortant', prod:'Pipette spot-on, comprimé, collier antiparasitaire', attention:'Produits chien ≠ chat — certains toxiques pour le chat'},
  {type:'Ectoparasites — Tiques', freq:'Avant chaque saison/sortie en forêt', prod:'Pipette, collier, comprimé préventif', attention:'Retirer avec crochet tire-tiques — ne jamais arracher à la main'},
  {type:'Endoparasites — Vers ronds', freq:'Tous les 3 mois chez l\'adulte — mensuel jusqu\'à 6 mois', prod:'Comprimé vermifuge (Milbemax, Drontal, Panacur)', attention:'Dosage impératif selon le poids exact'},
  {type:'Endoparasites — Vers plats', freq:'Tous les 3 mois si animal chasseur ou accès aux rongeurs', prod:'Comprimé à base de praziquantel', attention:'Zoonose possible : risque transmission à l\'humain'},
];

// Situations conflictuelles — cas CNV
var CAS_CONFLIT = [
  {id:'cf1', titre:'M. Renard — Facture contestée',
   contexte:'M. Renard arrive à l\'accueil très agité. Il agite une facture de 380€ pour la stérilisation de sa chatte et dit : "C\'est un scandale ! Vous m\'avez arnaqué ! Je vais écrire sur Google que vous volez vos clients !"',
   question:'Comment répondez-vous selon les principes UC1 / CNV ?',
   reponse:'**Écouter sans couper.** Laisser M. Renard exprimer son mécontentement. **Reformuler sans valider l\'agression :** "Je comprends que cette facture vous surprend et que vous êtes en colère." **Expliquer calmement :** Détailler chaque poste (anesthésie, acte, hospitalisation, médicaments). **Ne pas s\'excuser des prix.** Si la tension reste forte : "Je vais demander au Dr [X] de vous rejoindre pour vous expliquer en détail." **Ne jamais rentrer dans le conflit** ni critiquer les tarifs de la clinique.'},
  {id:'cf2', titre:'Mme Petit — Annonce du décès',
   contexte:'Mme Petit arrive pour récupérer son chien Noisette, opéré hier. Vous savez que Noisette est décédé pendant la nuit en réanimation. Le vétérinaire est en consultation.',
   question:'Quelle est votre conduite à tenir ?',
   reponse:'**Ne jamais annoncer le décès seule.** C\'est le rôle du vétérinaire. **Accueillir Mme Petit chaleureusement** sans lui mentir ni lui donner d\'information. "Bonjour Madame Petit, je préviens Dr [X] qui va vous rejoindre." **Alerter immédiatement le vétérinaire** — interrompre la consultation si nécessaire. **Installer Mme Petit dans un espace calme et privé.** Proposer un verre d\'eau. Rester disponible après l\'annonce pour le soutien.'},
  {id:'cf3', titre:'Urgence téléphonique — Chien qui convulse',
   contexte:'Il est 18h45. La clinique ferme à 19h. Mme Garcia appelle en panique : "Mon chien Bull, 5 ans, il tremble de partout, les dents claquent, les yeux révulsés. Ça dure depuis 5 minutes !"',
   question:'Quel est votre triage et votre conduite ?',
   reponse:'**Convulsion en cours = URGENCE VITALE.** Questions rapides : "Depuis combien de temps ? A-t-il ingéré quelque chose ? Est-il diabétique ?" **Ne pas faire attendre.** Dire : "Venez IMMÉDIATEMENT, je préviens le vétérinaire maintenant." **Alerter le vétérinaire** avant même la fin de l\'appel. **Conseiller le propriétaire** : "Ne mettez rien dans sa gueule, éloignez les objets, allongez-le sur le flanc, ne le retenez pas." Préparer l\'arrivée (contention, monitoring).'},
];

// Devis — structure pédagogique
var DEVIS_ELEMENTS = [
  {poste:'Consultation', detail:'Acte médical du vétérinaire — inclut examen clinique complet'},
  {poste:'Actes chirurgicaux / techniques', detail:'Stérilisation, sutures, radiographie, échographie, analyses'},
  {poste:'Anesthésie', detail:'Prémédication + induction + entretien + monitoring — coût justifié par la sécurité'},
  {poste:'Hospitalisation', detail:'Par 24h ou fraction — surveillance, soins, alimentation, chauffage'},
  {poste:'Médicaments et consommables', detail:'Médicaments prescrits, pansements, matériel à usage unique'},
  {poste:'TVA', detail:'5,5% sur les actes vétérinaires médicaux · 20% sur certains produits'},
];

// Quiz UC1
var QUIZ_UC1 = [
  {q:'Un client appelle et vous demande si les tremblements de son chien depuis ce matin sont graves. Que répondez-vous ?',
   opts:[
     'Non c\'est sûrement pas grave — venez en fin de journée',
     'Posez les questions de triage, informez le vétérinaire et orientez selon l\'évaluation réelle',
     'Je ne peux pas vous répondre — appelez les urgences vétérinaires',
     'Donnez-lui de l\'aspirine et surveillez'
   ],rep:1,
   expl:'L\'ASV **pose les questions de triage** (depuis quand, conscient, mange-t-il, a-t-il ingéré quelque chose), **informe le vétérinaire** et oriente en conséquence. Elle ne rassure jamais sans évaluation ni ne donne de conseil médical. Ici les tremblements peuvent signaler une hypoglycémie, une intoxication ou une crise convulsive — urgences potentielles.'},
  {q:'Un client demande un conseil pour nourrir son chat stérilisé qui grossit. L\'ASV doit :',
   opts:[
     'Prescrire un régime amaigrissant vétérinaire',
     'Conseiller une alimentation stérilisé/light selon les gammes disponibles et en référer au vétérinaire',
     'Refuser tout conseil nutritionnel — ce n\'est pas son rôle',
     'Recommander le BARF sans avis vétérinaire'
   ],rep:1,
   expl:'L\'ASV **peut et doit conseiller en nutrition** (UC1-3). Elle oriente vers les gammes adaptées (stérilisé, contrôle de poids) disponibles en clinique, conformément aux préconisations du vétérinaire. Elle peut orienter vers une consultation si le surpoids est important, mais ne prescrit pas de régime thérapeutique.'},
  {q:'La vermifugation d\'un chien adulte standard doit se faire :',
   opts:[
     'Une fois par an suffit',
     'Uniquement si le chien a des vers visibles',
     'Tous les 3 mois environ — adaptée au mode de vie',
     'Tous les mois toute l\'année obligatoirement'
   ],rep:2,
   expl:'La vermifugation standard d\'un chien adulte se fait **tous les 3 mois environ** (4 fois par an). La fréquence peut être augmentée pour les animaux chasseurs, en contact avec des enfants, ou mangeant des proies. Le vermifuge mensuel est recommandé pour les chiots jusqu\'à 6 mois. Le dosage doit toujours être adapté au poids exact.'},
  {q:'Un client est en colère et dit que les tarifs de la clinique sont scandaleux. L\'ASV doit :',
   opts:[
     'S\'excuser pour les prix et promettre une remise',
     'Argumenter que la clinique est la moins chère de la région',
     'Écouter, reformuler, expliquer calmement chaque poste et escalader au vétérinaire si nécessaire',
     'Ignorer les remarques et continuer la facturation'
   ],rep:2,
   expl:'Selon UC1-6 (CNV) : **écouter sans couper**, **reformuler** ("Je comprends que cette facture vous surprend"), **expliquer** chaque poste calmement. Ne jamais s\'excuser des prix ni promettre de remise. Si la tension persiste, escalader vers le vétérinaire responsable. Ne jamais critiquer la politique tarifaire de la clinique.'},
  {q:'L\'identification électronique (puce) est obligatoire en France pour :',
   opts:[
     'Tous les animaux de compagnie sans exception',

    q.opts.forEach(function(opt,i){
      var cls='';if(S.qShown){if(i===q.rep)cls='correct';else if(i===S.qSel)cls='wrong';}
      h+='<div class="quiz-opt '+cls+'" onclick="'+(S.qShown?'':'selQ('+i+')')+'">';
      h+='<span style="font-family:var(--mono);font-size:11px;flex-shrink:0">'+['A','B','C','D'][i]+'</span>';
      h+='<span>'+esc(opt)+'</span></div>';
    });
    if(S.qShown){
      h+='<div class="quiz-expl">'+q.expl.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</div>';
      h+='<button class="btn-p btn-full" style="margin-top:12px" onclick="nxtQ()">Question suivante →</button>';
    }
    h+='</div>';
    h+='<button class="btn-g btn-full" onclick="rstQ()" style="margin-top:8px;color:var(--em3)">↺ Recommencer</button>';
    h+='</div>';

  // ── ANALYSE IA ─────────────────────────────────────────
  } else if(S.onglet==='analyse'){
    h+='<div class="fadeup"><div class="card em">';
    h+='<div class="card-title" style="color:var(--em3)">🤖 Analyse IA · Conseil clientèle UC1</div>';
    h+='<div class="card-sub">Soumettez une situation d\'accueil ou un cas pratique — l\'IA vous guide en tant que formateur CAFASV UC1.</div>';
    h+='<textarea id="ia-q" style="width:100%;min-height:80px;background:rgba(0,0,0,.4);border:1.5px solid rgba(160,96,248,.12);border-radius:8px;color:var(--txt);padding:11px;font-size:13px;font-family:var(--sans);outline:none;resize:vertical;line-height:1.6;margin-bottom:10px" placeholder="Ex: Une cliente pleure car son chien vient de mourir sous anesthésie. Comment réagir ? Ou : Un client veut absolument une ordonnance pour acheter des médicaments moins chers ailleurs. Que faire ?"></textarea>';
    h+='<button class="btn-p btn-full" onclick="runIA()">🏥 Analyser cette situation →</button>';
    if(S.loading){h+='<div class="dots" style="margin-top:14px"><span></span><span></span><span></span><div class="dots-msg">Analyse en cours...</div></div>';}
    if(!S.loading&&S.analyse){h+='<div class="analysis fadeup" style="margin-top:14px">'+md(S.analyse)+'</div>';}
    h+='<hr class="div">';
    if(!S.apiKeySaved){
      h+='<div class="apikey-box"><p>Clé API Anthropic. <a href="https://console.anthropic.com/" target="_blank">Obtenir →</a></p>';
      h+='<div class="apikey-row"><input type="password" placeholder="sk-ant-api03-..." value="'+esc(S.apiKey)+'" oninput="S.apiKey=this.value">';
      h+='<button onclick="svKey()">Sauver</button></div></div>';
    } else {h+='<div style="color:var(--green);font-family:var(--mono);font-size:11px">// configured ✓</div>';}
    h+='</div></div>';
  }

  if(S.view!=='welcome'){
    h+='<div style="margin-top:10px;display:flex;gap:8px">';
    h+='<button class="btn-g" onclick="go(\'welcome\')" style="color:var(--em3);border-color:rgba(160,96,248,.2)">← Accueil</button>';
    h+='<button class="btn-g" onclick="window.location.href=\'index.html\'">⌂ SimVeto</button>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

function go(v){S.view=v;render();window.scrollTo({top:0,behavior:'smooth'});}
function setO(o){S.onglet=o;S.analyse='';render();window.scrollTo({top:0,behavior:'smooth'});}
function selQ(i){if(S.qShown)return;S.qSel=i;S.qShown=true;S.qTotal++;if(i===QUIZ_UC1[S.qIdx%QUIZ_UC1.length].rep)S.qScore++;render();}
function nxtQ(){S.qIdx++;S.qSel=null;S.qShown=false;render();window.scrollTo({top:0,behavior:'smooth'});}
function rstQ(){S.qIdx=0;S.qScore=0;S.qTotal=0;S.qSel=null;S.qShown=false;render();}
function svKey(){localStorage.setItem('simaccueil_key',S.apiKey);S.apiKeySaved=true;render();}

async function runIA(){
  var el=document.getElementById('ia-q');
  if(!el||!el.value.trim())return;
  S.loading=true;S.analyse='';render();
  try{
    var headers={'Content-Type':'application/json'};
    if(S.apiKey){headers['x-api-key']=S.apiKey;headers['anthropic-version']='2023-06-01';}
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        messages:[{role:'user',content:'Tu es formateur CAFASV expert en UC1 "Conseiller la clientele du veterinaire" (RNCP40344). Situation soumise par une etudiante ASV : '+el.value+'\n\nAnalyse en 3 parties :\n**Analyse de la situation** — identifier les enjeux (relation client, urgence, legal)\n**Demarche ASV recommandee** — que faire concretement, dans quel ordre, avec quelles phrases\n**Points de vigilance CAFASV** — erreurs frequentes au jury, perimetre ASV vs veterinaire\n\nTutoie l\'etudiante. Cite les competences UC1 concernees. Propose des phrases types. Utilise **gras** pour les points cles.'}]})});
    var data=await res.json();
    if(data.error)throw new Error(data.error.message);
    S.analyse=data.content&&data.content.find(function(b){return b.type==='text';})?data.content.find(function(b){return b.type==='text';}).text:'';
  }catch(e){S.analyse='**Erreur**\n\n'+e.message;}
  S.loading=false;render();
}
render();
</script>
