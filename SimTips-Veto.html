<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SimTips · PraxisVeto</title>
<meta name="theme-color" content="#0a0d08">
<style>
:root{--bg:#0a0d08;--card:rgba(255,255,255,.04);--bdr:rgba(255,255,255,.08);--txt:#d8e8d0;--txt2:#4a6840;--em:#78d840;--amber:#e8a030;--red:#e84040;--purple:#a060ff;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:16px;}
h1{font-family:Georgia,serif;font-size:22px;color:var(--em);margin-bottom:4px;}
.sub{font-size:11px;color:var(--txt2);margin-bottom:20px;font-family:monospace;}
.loterie{text-align:center;padding:24px 16px;background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;margin-bottom:16px;}
.loterie h2{font-size:16px;color:var(--txt);margin-bottom:6px;}
.loterie p{font-size:12px;color:var(--txt2);margin-bottom:16px;}
.btn-loterie{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#50a820,#78d840);color:#0a0d08;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-small{display:inline-block;padding:7px 14px;background:rgba(255,255,255,.06);color:var(--txt2);border:1px solid var(--bdr);border-radius:8px;font-size:11px;cursor:pointer;margin:3px;}
.compteur{text-align:center;font-family:monospace;font-size:11px;color:var(--txt2);margin-bottom:12px;}
.tip-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:16px;margin-bottom:16px;}
.tip-type{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.tip-type.role{background:rgba(160,96,255,.1);color:var(--purple);border:1px solid rgba(160,96,255,.2);}
.tip-type.cas{background:rgba(232,160,48,.1);color:var(--amber);border:1px solid rgba(232,160,48,.2);}
.tip-type.tip{background:rgba(120,216,64,.1);color:var(--em);border:1px solid rgba(120,216,64,.2);}
.tip-title{font-size:16px;font-weight:700;margin-bottom:10px;line-height:1.3;}
.tip-situation{background:rgba(255,255,255,.03);border-left:3px solid var(--bdr);padding:10px;border-radius:0 8px 8px 0;font-size:12px;color:var(--txt2);margin-bottom:14px;line-height:1.6;}
.tip-etapes{list-style:none;margin-bottom:14px;}
.tip-etapes li{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;display:flex;gap:8px;align-items:flex-start;}
.tip-etapes li:last-child{border-bottom:none;}
.etape-num{background:rgba(120,216,64,.15);color:var(--em);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.etape-num.amber{background:rgba(232,160,48,.15);color:var(--amber);}
.etape-num.purple{background:rgba(160,96,255,.15);color:var(--purple);}
.tip-alert{background:rgba(232,64,64,.06);border:1px solid rgba(232,64,64,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--red);margin-bottom:10px;}
.tip-memo{background:rgba(120,216,64,.06);border:1px solid rgba(120,216,64,.15);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--em);margin-top:10px;}
.liste-item{padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:12px;}
.liste-item:active{background:rgba(255,255,255,.05);}
.liste-item:last-child{border-bottom:none;}
.liste-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:12px;margin-bottom:16px;overflow:hidden;display:none;}
.liste-wrap.show{display:block;}
#tip-display{display:none;}
#tip-display.show{display:block;}
.btn-nouveau{width:100%;padding:10px;background:linear-gradient(135deg,#50a820,#78d840);color:#0a0d08;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;}
</style>
</head>
<body>
 
<h1>SimTips ASV</h1>
<p class="sub">Preparation a l'examen oral · Tirage aleatoire · Jeux de role · Etudes de cas · Gestes pratiques</p>
 
<div class="loterie">
  <h2>Tirage au sort</h2>
  <p>Comme a l'examen — un sujet au hasard.</p>
  <button class="btn-loterie" onclick="tirerAuSort(null)">🎲 Tirer un sujet</button>
  <br><br>
  <button class="btn-small" onclick="tirerAuSort('role')">🎭 Jeu de role</button>
  <button class="btn-small" onclick="tirerAuSort('cas')">📋 Etude de cas</button>
  <button class="btn-small" onclick="tirerAuSort('tip')">⚡ Geste pratique</button>
</div>
 
<div class="compteur" id="compteur"></div>
 
<div id="tip-display">
  <div class="tip-card">
    <span class="tip-type" id="tip-type-badge"></span>
    <div class="tip-title" id="tip-title"></div>
    <div class="tip-situation" id="tip-situation"></div>
    <ul class="tip-etapes" id="tip-etapes"></ul>
    <div class="tip-alert" id="tip-alert"></div>
    <div class="tip-memo" id="tip-memo"></div>
    <button class="btn-nouveau" onclick="tirerAuSort(null)">🎲 Nouveau tirage</button>
  </div>
</div>
 
<div style="text-align:center;margin:8px 0">
  <button class="btn-small" onclick="toggleListe()">📚 Voir tous les tips</button>
</div>
 
<div class="liste-wrap" id="tips-liste"></div>
 
<script>
var TIPS = [
  {type:"role",titre:"Client en urgence - chien qui convulse",situation:"Il est 14h. Un client appelle, panique : son labrador de 5 ans convulse depuis 2 minutes.",etapes:["Garder son calme et rassurer le client","Relever le nom et l'age du chien","L'inviter a venir immediatement en clinique","Lui dire de NE PAS mettre les doigts dans la gueule","Preparer la salle d'urgence","Prevenir le veterinaire immediatement"],alerte:"Ne jamais minimiser une convulsion - toujours urgence immediate.",memo:"Mots cles : calme, rapide, prevenir le veto, preparer la salle."},
  {type:"role",titre:"Client mecontent du devis",situation:"Un client decouvre une facture plus elevee que prevu apres une sterilisation et monte le ton.",etapes:["Accueillir avec calme, ne pas hausser le ton","Laisser le client s'exprimer completement","Reconnaitre son ressenti : 'Je comprends que ca vous surprend'","Expliquer poste par poste les elements du devis","Si desaccord persistant, appeler le veterinaire","Proposer si possible une solution"],alerte:"Ne jamais critiquer le veterinaire devant le client.",memo:"CNV : ecoute active, reformulation, solution."},
  {type:"role",titre:"Annonce d'un deces a un proprietaire",situation:"Le chat d'une cliente agee est decede pendant une intervention. Le veterinaire vous demande d'accompagner la cliente.",etapes:["Guider la cliente dans un espace prive et calme","S'asseoir a son niveau, contact visuel","Annonce claire et douce : 'Votre chat n'a pas survecu'","Laisser le silence - ne pas meubler","Proposer un mouchoir, un verre d'eau","Informer sur les options : cremation, retour du corps"],alerte:"Ne jamais dire 'il est parti' ou 'vous en aurez un autre'.",memo:"Presence, silence, empathie - pas de solutions immediates."},
  {type:"role",titre:"Proprietaire d'un animal mordeur",situation:"Un client arrive avec son chien de categorie 1. Il dit que le chien 'ne mord jamais'.",etapes:["Verifier carnet de vaccination et permis de detention","Demander si le chien a deja mordu","Informer des obligations : museliere, laisse courte","Preparer la salle avec museliere adaptee","Alerter le veterinaire avant introduction","Documenter dans le dossier : categorie, comportement"],alerte:"CV1 ou CV2 = museliere et laisse obligatoires. Responsabilite civile du proprietaire engagee.",memo:"Verification documents + securisation = priorite absolue."},
  {type:"role",titre:"Explication d'un traitement antiparasitaire",situation:"Un client achete un antiparasitaire pour son chien. Il vous demande comment l'utiliser.",etapes:["Verifier que le produit est adapte au poids du chien","Expliquer la zone d'application : entre les omoplates, sur la peau","Preciser : ne pas toucher le produit, laisser secher 24h","Conseiller de ne pas baigner l'animal 48h avant et apres","Rappeler la frequence : generalement tous les mois","Proposer un rappel dans le logiciel"],memo:"Adapter le produit au poids + espece + age du chien."},
  {type:"role",titre:"Gestion d'un animal agressif a l'accueil",situation:"Un chat arrive dans un transport ouvert. Il siffle et griffe. La salle d'attente est pleine.",etapes:["Rester calme, pas de gestes brusques","Demander au proprietaire de fermer le transport","Orienter vers salle d'attente separee chats/chiens","Prevenir le veterinaire avant entree en salle","Preparer gants de contention et serviette epaisse","Ne jamais forcer l'extraction - laisser le veto decider"],alerte:"Un chat stresse peut infliger des morsures profondes. Ne pas agir seul sans protection.",memo:"Separation, protection, prevenir le veto - jamais de force."},
  {type:"cas",titre:"Chien avec FC a 180 bpm",situation:"Vous prenez les constantes d'un berger allemand adulte. La frequence cardiaque est de 180 bpm. Norme : 60-140 bpm.",etapes:["Verifier la mesure : reprendre la prise de pouls femorale","Verifier si l'animal est stresse - repositionner","Constater l'anomalie sans minimiser","Alerter immediatement le veterinaire avec les valeurs exactes","Preparer le dossier et noter l'heure","Ne jamais diagnostiquer - role du veterinaire"],alerte:"FC > 160 bpm chez un chien adulte calme = anomalie cardiaque possible.",memo:"Norme chien adulte : 60-140 bpm · Chiot : jusqu'a 180 · Chat : 120-200 bpm"},
  {type:"cas",titre:"Chat avec temperature a 40,5 degres",situation:"Vous prenez la temperature rectale d'un chat de 3 ans. Le thermometre affiche 40,5 degres. Norme : 38-39,5 degres.",etapes:["Verifier la mesure - repositionner si doute","Evaluer l'etat general : abattement, prostration","Prendre les autres constantes : FC, FR, hydratation","Transmettre au veterinaire avec valeurs precises","Preparer une salle de consultation","Proposer de l'eau fraiche si le veterinaire valide"],alerte:"Hyperthermie > 40 degres chez le chat = urgence.",memo:"Norme chat : 38-39,5 · Chien : 38-39 · Lapin : 38,5-40"},
  {type:"cas",titre:"Erreur de medication suspectee",situation:"Un client rappelle 2h apres avoir achete un vermifuge pour chien. Il l'a donne a son chat de 2 kg.",etapes:["Ecouter sans paniquer et noter toutes les informations","Relever : produit, dose, poids du chat, heure","Transferer immediatement au veterinaire","Le veterinaire decide si urgence ou non","Ne jamais donner de conseils medicaux","Documenter l'incident"],alerte:"Certains produits pour chiens sont MORTELS pour les chats (permethrine). Urgence absolue.",memo:"TOUJOURS verifier l'espece et le poids avant de vendre un antiparasitaire."},
  {type:"cas",titre:"Aiguilles usagees dans la mauvaise poubelle",situation:"En fin de journee, un collegue met des aiguilles usagees dans la poubelle ordinaire.",etapes:["Intervenir immediatement avec tact","Retirer les aiguilles avec une pince - jamais a mains nues","Placer dans le conteneur DASRI jaune ferme","Rappeler la reglementation : aiguilles = DASRI obligatoire","Signaler au responsable si necessaire","Verifier que le conteneur est aux 3/4 plein maximum"],alerte:"Aiguilles dans poubelle ordinaire = infraction legale + risque AES pour les agents de collecte.",memo:"DASRI = Dechets d'Activite de Soins a Risques Infectieux · Conteneur jaune."},
  {type:"cas",titre:"Animal inconscient en urgence",situation:"Une cliente entre en courant avec son golden retriever inconscient dans les bras. Il ne reagit pas.",etapes:["Appeler immediatement le veterinaire","Guider vers la salle d'urgence preparee","Ne pas bloquer pour les formalites administratives","Preparer : oxygene, table, materiel IV","Prendre les informations pendant que le veto agit","Garder la cliente informee dans la salle d'attente"],alerte:"En urgence vitale : l'animal d'abord, les formalites ensuite.",memo:"Preparer la salle avant l'arrivee si appel telephonique prealable."},
  {type:"cas",titre:"Demande de medicament sans ordonnance",situation:"Un client demande du Metacam pour son chien sans ordonnance. Il dit en avoir deja eu.",etapes:["Expliquer calmement que le Metacam est sur ordonnance","Verifier si une ordonnance recente existe dans le dossier","Si oui : valider avec le veterinaire avant de delivrer","Si non : proposer une consultation","Ne jamais delivrer sans ordonnance valide","Documenter le refus si necessaire"],alerte:"Delivrer un medicament sur ordonnance sans prescription = infraction penale.",memo:"POM = Prescription Only Medicine = ordonnance obligatoire."},
  {type:"tip",titre:"Prise du pouls femoral chez le chien",situation:"Le veterinaire vous demande de prendre la frequence cardiaque d'un labrador avant la consultation.",etapes:["Positionner le chien en decubitus lateral","Localiser l'artere femorale dans le triangle de scarpa (face interne de la cuisse)","Poser 2 doigts (index + majeur) sur l'artere - jamais le pouce","Compter les pulsations pendant 15 secondes","Multiplier par 4 pour obtenir la FC en bpm","Noter et transmettre au veterinaire"],alerte:"Ne pas utiliser le pouce - il a son propre pouls et fausse la mesure.",memo:"Norme chien adulte : 60-140 bpm · Compter 15 sec x4."},
  {type:"tip",titre:"Prise de temperature rectale chez le chat",situation:"Preparez et realisez la prise de temperature d'un chat adulte en consultation.",etapes:["Preparer le thermometre digital et du gel lubrifiant","Positionner le chat en decubitus sternal ou lateral","Un assistant maintient la tete et les pattes avant","Introduire le thermometre a 2-3 cm dans le rectum","Attendre le bip et retirer doucement","Nettoyer le thermometre avec alcool 70°"],alerte:"Ne jamais forcer si le chat resiste - risque de perforation rectale.",memo:"Norme chat : 38-39,5 degres · Gel lubrifiant obligatoire · Profondeur : 2-3 cm."},
  {type:"tip",titre:"Pose d'une collerette elizabethaine",situation:"Suite a une suture, le veterinaire vous demande de poser une collerette sur un beagle de 12 kg.",etapes:["Choisir la bonne taille : depasse le museau de 2-3 cm","Passer autour du cou, attaches vers l'arriere","Glisser 2 doigts entre la collerette et le cou","Fixer avec les lacets ou le systeme de fermeture","Verifier que le chien peut manger et boire","Observer la deambulation"],alerte:"Trop serre = trouble respiratoire. Trop lache = le chien l'enleve et leche la plaie.",memo:"2 doigts d'espace = regle universelle."},
  {type:"tip",titre:"Preparation de la salle de chirurgie",situation:"Une sterilisation de chatte est prevue dans 30 minutes. Preparez la salle.",etapes:["Nettoyer et desinfecter toutes les surfaces","Verifier et preparer la table chauffante","Sortir le materiel sterile : champ operatoire, instruments, fils","Preparer le monitoring : ECG, SpO2, capnographe","Verifier les gaz anesthesiques et le circuit","Preparer les medicaments selon le protocole du veterinaire"],alerte:"Ne jamais ouvrir un emballage sterile sans verifier date et integrite.",memo:"Check-list obligatoire avant toute chirurgie."},
  {type:"tip",titre:"Mesure du TRC",situation:"Le veterinaire vous demande d'evaluer l'etat circulatoire d'un chien en choc.",etapes:["Relever la levre superieure du chien","Appuyer fermement avec le pouce sur la gencive 2 secondes","Relacher et chronometrer jusqu'au retour de la couleur rose","Normal : retour en moins de 2 secondes","Anormal : > 2 secondes = signe de choc ou deshydratation","Transmettre immediatement au veterinaire"],alerte:"TRC > 2 sec = urgence circulatoire. Alerter sans delai.",memo:"TRC normal < 2 sec · Gencive rose = bonne perfusion · Blanche/bleue = urgence."},
  {type:"tip",titre:"Nettoyage d'une cage d'hospitalisation",situation:"Un chien vient de quitter la cage. Vous devez la preparer pour le suivant.",etapes:["Enfiler les EPI : gants, tablier","Retirer tous les residus : litiere, gamelles, poils","Nettoyer avec detergent : eliminer toute matiere organique","Rincer abondamment - le detergent inactive les desinfectants","Appliquer le desinfectant : respecter le temps de contact (5 min minimum)","Laisser secher completement avant introduction d'un nouvel animal"],alerte:"Desinfection sans nettoyage prealable = INEFFICACE.",memo:"Nettoyer + Rincer + Desinfecter + Rincer + Secher = protocole complet."},
];
 
var nbTires = 0;
 
function tirerAuSort(filtre){
  var pool = filtre ? TIPS.filter(function(t){ return t.type === filtre; }) : TIPS;
  var tip = pool[Math.floor(Math.random() * pool.length)];
  nbTires++;
  document.getElementById('compteur').textContent = 'Sujet ' + nbTires + ' · ' + pool.length + ' disponibles';
  afficherTip(tip);
}
 
function afficherTip(tip){
  var display = document.getElementById('tip-display');
  var typeLabel = tip.type === 'role' ? '🎭 Jeu de role' : tip.type === 'cas' ? '📋 Etude de cas' : '⚡ Geste pratique';
  var color = tip.type === 'role' ? 'purple' : tip.type === 'cas' ? 'amber' : '';
 
  document.getElementById('tip-type-badge').textContent = typeLabel;
  document.getElementById('tip-type-badge').className = 'tip-type ' + tip.type;
  document.getElementById('tip-title').textContent = tip.titre;
  document.getElementById('tip-situation').textContent = tip.situation;
 
  var etapesEl = document.getElementById('tip-etapes');
  etapesEl.innerHTML = '';
  tip.etapes.forEach(function(e, i){
    var li = document.createElement('li');
    li.innerHTML = '<span class="etape-num ' + color + '">' + (i+1) + '</span><span>' + e + '</span>';
    etapesEl.appendChild(li);
  });
 
  var alertEl = document.getElementById('tip-alert');
  alertEl.textContent = tip.alerte ? '⚠️ ' + tip.alerte : '';
  alertEl.style.display = tip.alerte ? 'block' : 'none';
 
  var memoEl = document.getElementById('tip-memo');
  memoEl.textContent = tip.memo ? '💡 ' + tip.memo : '';
  memoEl.style.display = tip.memo ? 'block' : 'none';
 
  display.className = 'show';
  window.scrollTo(0, 0);
}
 
function toggleListe(){
  var liste = document.getElementById('tips-liste');
  if(liste.classList.contains('show')){
    liste.classList.remove('show');
    return;
  }
  liste.innerHTML = '';
  TIPS.forEach(function(tip){
    var typeLabel = tip.type === 'role' ? '🎭' : tip.type === 'cas' ? '📋' : '⚡';
    var item = document.createElement('div');
    item.className = 'liste-item';
    item.innerHTML = '<span style="font-size:16px">' + typeLabel + '</span><span>' + tip.titre + '</span>';
    item.onclick = function(){ afficherTip(tip); liste.classList.remove('show'); window.scrollTo(0,0); };
    liste.appendChild(item);
  });
  liste.classList.add('show');
}
</script>
</body>
</html>
