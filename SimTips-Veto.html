<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SimTips · PraxisVeto</title>
<meta name="theme-color" content="#0a0d08">
<style>
:root{--bg:#0a0d08;--card:rgba(255,255,255,.04);--bdr:rgba(255,255,255,.08);--txt:#d8e8d0;--txt2:#4a6840;--em:#78d840;--amber:#e8a030;--red:#e84040;--purple:#a060ff;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:20px;}
h1{font-family:Georgia,serif;font-size:24px;color:var(--em);margin-bottom:4px;}
.sub{font-size:12px;color:var(--txt2);margin-bottom:24px;font-family:monospace;}
 
/* LOTERIE */
.loterie{text-align:center;padding:32px 20px;background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;margin-bottom:24px;}
.loterie h2{font-size:18px;color:var(--txt);margin-bottom:8px;}
.loterie p{font-size:13px;color:var(--txt2);margin-bottom:20px;}
.btn-loterie{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#50a820,#78d840);color:#0a0d08;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s;}
.btn-loterie:active{transform:scale(.97);}
.btn-small{display:inline-block;padding:8px 18px;background:rgba(255,255,255,.06);color:var(--txt2);border:1px solid var(--bdr);border-radius:8px;font-size:12px;cursor:pointer;margin:4px;}
.btn-small:hover{background:rgba(255,255,255,.1);}
 
/* FILTRE TYPE */
.filtres{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;}
.filtre{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--card);font-size:12px;color:var(--txt2);cursor:pointer;transition:all .15s;}
.filtre.active-role{border-color:var(--purple);color:var(--purple);background:rgba(160,96,255,.1);}
.filtre.active-cas{border-color:var(--amber);color:var(--amber);background:rgba(232,160,48,.1);}
.filtre.active-tip{border-color:var(--em);color:var(--em);background:rgba(120,216,64,.1);}
 
/* TIP CARD */
.tip-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:20px;margin-bottom:16px;display:none;animation:fadeUp .3s ease;}
.tip-card.show{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tip-type{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-family:monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.tip-type.role{background:rgba(160,96,255,.1);color:var(--purple);border:1px solid rgba(160,96,255,.2);}
.tip-type.cas{background:rgba(232,160,48,.1);color:var(--amber);border:1px solid rgba(232,160,48,.2);}
.tip-type.tip{background:rgba(120,216,64,.1);color:var(--em);border:1px solid rgba(120,216,64,.2);}
.tip-title{font-size:18px;font-weight:700;margin-bottom:12px;line-height:1.3;}
.tip-situation{background:rgba(255,255,255,.03);border-left:3px solid var(--bdr);padding:12px;border-radius:0 8px 8px 0;font-size:13px;color:var(--txt2);margin-bottom:16px;line-height:1.6;}
.tip-etapes{list-style:none;margin-bottom:16px;}
.tip-etapes li{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;display:flex;gap:10px;align-items:flex-start;}
.tip-etapes li:last-child{border-bottom:none;}
.etape-num{background:rgba(120,216,64,.15);color:var(--em);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.etape-num.amber{background:rgba(232,160,48,.15);color:var(--amber);}
.etape-num.purple{background:rgba(160,96,255,.15);color:var(--purple);}
.tip-alert{background:rgba(232,64,64,.06);border:1px solid rgba(232,64,64,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:12px;}
.tip-memo{background:rgba(120,216,64,.06);border:1px solid rgba(120,216,64,.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--em);margin-top:12px;}
.compteur{text-align:center;font-family:monospace;font-size:11px;color:var(--txt2);margin-bottom:16px;}
 
/* LISTE */
.tips-liste{display:none;}
.tips-liste.show{display:block;}
.liste-item{padding:12px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .1s;}
.liste-item:hover{background:rgba(255,255,255,.03);}
.liste-item:last-child{border-bottom:none;}
</style>
</head>

var currentIndex = -1;
var currentFilter = null;
var history = [];
 
function tirerAuSort(filtre){
  currentFilter = filtre || null;
  var pool = currentFilter ? TIPS.filter(function(t){ return t.type === currentFilter; }) : TIPS;
  var idx = Math.floor(Math.random() * pool.length);
  var tip = pool[idx];
  currentIndex = TIPS.indexOf(tip);
  history.push(currentIndex);
  afficherTip(tip);
  document.getElementById('compteur').textContent = 'Tip ' + history.length + ' tire · ' + pool.length + ' disponibles';
}
 
function filtrerEtTirer(type){
  tirerAuSort(type);
}

  var memo = document.getElementById('tip-memo');
 
  card.classList.remove('show');
  setTimeout(function(){
    // Badge type
    var typeLabel = tip.type === 'role' ? '🎭 Jeu de role' : tip.type === 'cas' ? '📋 Etude de cas' : '⚡ Geste pratique';
    badge.textContent = typeLabel;
    badge.className = 'tip-type ' + tip.type;
 
    title.textContent = tip.titre;
    situation.textContent = tip.situation;
 
    // Etapes
    etapes.innerHTML = '';
    var color = tip.type === 'role' ? 'purple' : tip.type === 'cas' ? 'amber' : '';
    tip.etapes.forEach(function(e, i){
      var li = document.createElement('li');
      li.innerHTML = '<span class="etape-num ' + color + '">' + (i+1) + '</span><span>' + e + '</span>';
      etapes.appendChild(li);
    });
 
    // Alerte
    if(tip.alerte){
      alert.textContent = '⚠️ ' + tip.alerte;
      alert.style.display = 'block';
    } else {
      alert.style.display = 'none';
    }
 
    // Memo
    if(tip.memo){
      memo.textContent = '💡 ' + tip.memo;
      memo.style.display = 'block';
    } else {
      memo.style.display = 'none';
    }
 
    card.classList.add('show');
    card.scrollIntoView({behavior:'smooth', block:'start'});
  }, 100);
}
 
function toggleListe(){
  var liste = document.getElementById('tips-liste');
  if(liste.classList.contains('show')){
    liste.classList.remove('show');
    return;
  }
  liste.innerHTML = '';
  TIPS.forEach(function(tip, i){
    var typeLabel = tip.type === 'role' ? '🎭' : tip.type === 'cas' ? '📋' : '⚡';
    var item = document.createElement('div');
    item.className = 'liste-item';
    item.innerHTML = '<span style="font-size:18px">' + typeLabel + '</span><span style="font-size:13px">' + tip.titre + '</span>';
    item.onclick = function(){ afficherTip(tip); liste.classList.remove('show'); };
    liste.appendChild(item);
  });
  liste.classList.add('show');
}
</script>
