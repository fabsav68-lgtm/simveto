<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond vert forêt -->
  <rect width="512" height="512" rx="100" fill="#0a0d08"/>
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a0a"/>
      <stop offset="100%" stop-color="#0a0d08"/>
    </linearGradient>
    <linearGradient id="emGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78d840"/>
      <stop offset="100%" stop-color="#50a820"/>
    </linearGradient>
  </defs>

  <!-- Croix vétérinaire centrale -->
  <rect x="224" y="120" width="64" height="180" rx="12" fill="url(#emGrad)"/>
  <rect x="150" y="194" width="212" height="64" rx="12" fill="url(#emGrad)"/>

  <!-- Patte de chien (en bas) -->
  <ellipse cx="180" cy="360" rx="22" ry="18" fill="#78d840" opacity=".9"/>
  <ellipse cx="230" cy="375" rx="22" ry="18" fill="#78d840" opacity=".9"/>
  <ellipse cx="282" cy="375" rx="22" ry="18" fill="#78d840" opacity=".9"/>
  <ellipse cx="332" cy="360" rx="22" ry="18" fill="#78d840" opacity=".9"/>
  <!-- Coussinet central -->
  <ellipse cx="256" cy="400" rx="34" ry="26" fill="#78d840"/>

  <!-- Petits coussinets -->
  <ellipse cx="180" cy="342" rx="10" ry="8" fill="#50a820"/>
  <ellipse cx="230" cy="356" rx="10" ry="8" fill="#50a820"/>
  <ellipse cx="282" cy="356" rx="10" ry="8" fill="#50a820"/>
  <ellipse cx="332" cy="342" rx="10" ry="8" fill="#50a820"/>

  <!-- Texte SimVeto -->
  <text x="256" y="476" font-family="Arial, sans-serif" font-size="42" font-weight="900"
    fill="#78d840" text-anchor="middle" letter-spacing="-1">SimVeto</text>

  <!-- Ligne ECG verte subtile -->
  <polyline points="60,90 90,90 105,60 120,120 135,90 165,90"
    fill="none" stroke="#78d840" stroke-width="4" stroke-opacity=".35" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
